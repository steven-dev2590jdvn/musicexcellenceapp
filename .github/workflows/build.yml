name: Build iOS Device IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Add iOS Platform
        run: cordova platform add ios

      - name: Build Cordova Project
        run: cordova prepare ios

      - name: Build for iPhone Device
        run: |
          cd platforms/ios

          xcodebuild \
            -workspace "Music Excellence.xcworkspace" \
            -scheme "Music Excellence" \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R "platforms/ios/build/Release-iphoneos/Music Excellence.app" Payload/
          cd Payload
          zip -r ../MusicExcellence.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicExcellence-IPA
          path: MusicExcellence.ipa
