name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install Dependencies
        run: npm install

      - name: Add iOS Platform
        run: |
          if [ ! -d "platforms/ios" ]; then
            cordova platform add ios
          fi

      - name: Prepare Cordova
        run: cordova prepare ios

      - name: Locate Workspace
        run: |
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" | head -n 1)

          if [ -z "$WORKSPACE" ]; then
            echo "No workspace found!"
            exit 1
          fi

          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "Workspace: $WORKSPACE"

      - name: Detect Scheme
        run: |
          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | \
          python3 -c "import sys,json;print(json.load(sys.stdin)['workspace']['schemes'][0])")

          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Scheme: $SCHEME"

      - name: Build Device App
        run: |
          xcodebuild \
          -workspace "$WORKSPACE" \
          -scheme "$SCHEME" \
          -configuration Release \
          -destination generic/platform=iOS \
          CODE_SIGNING_ALLOWED=NO \
          clean build

      - name: Find .app
        run: |
          APP=$(find platforms/ios/build -name "*.app" | grep Release-iphoneos | head -n 1)

          echo "APP=$APP" >> $GITHUB_ENV

          echo "Found:"
          echo "$APP"

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R "$APP" Payload/
          cd Payload
          zip -r ../MusicExcellence.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicExcellence-IPA
          path: MusicExcellence.ipa
