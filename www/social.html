    *{margin:0;padding:0;box-sizing:border-box}:root{--primary:#3B82F6;--primary-dark:#1E40AF;--secondary:#8B5CF6;--secondary-dark:#6D28D9;--bg-primary:#0F0F23;--bg-secondary:#1A1A2E;--bg-tertiary:#16213E;--text-primary:#FFFFFF;--text-secondary:#94A3B8;--accent:#06B6D4;--success:#10B981;--warning:#F59E0B;--error:#EF4444;--card-bg:rgba(26,26,46,0.8);--border:rgba(59,130,246,0.2)}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,var(--bg-primary) 0%,var(--bg-secondary) 50%,var(--bg-tertiary) 100%);color:var(--text-primary);font-weight:600;min-height:100vh;overflow-x:hidden}h1,h2,h3{font-weight:800;letter-spacing:-0.02em}h1{font-size:clamp(24px,5vw,32px);background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}h2{font-size:clamp(20px,4vw,24px);color:var(--text-primary);margin-bottom:16px}h3{font-size:18px;color:var(--primary);margin-bottom:12px}.container{max-width:100vw;margin:0 auto;padding:20px 16px 100px;min-height:100vh}.card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}.btn{display:block;width:100%;padding:16px;margin:8px 0;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:16px;text-align:center;cursor:pointer;transition:all 0.2s ease;text-decoration:none;color:var(--text-primary);background:linear-gradient(135deg,var(--primary),var(--secondary));box-shadow:0 4px 16px rgba(59,130,246,0.3)}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(59,130,246,0.4)}.btn:active{transform:translateY(0)}.btn-secondary{background:linear-gradient(135deg,var(--bg-secondary),var(--bg-tertiary));border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.2)}.btn-small{padding:12px;font-size:14px}.apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.app-item{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:all 0.2s ease;text-decoration:none;color:inherit;cursor:pointer}.app-item:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 24px rgba(59,130,246,0.3)}.app-icon{width:50px;height:50px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:12px;background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(139,92,246,0.2));border:2px solid var(--border)}.app-icon svg{width:28px;height:28px;fill:var(--primary)}.app-name{font-size:13px;font-weight:600;color:var(--text-primary)}.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:24px 0}.footer-info{text-align:center;padding:20px;margin-top:20px}.footer-title{font-size:14px;font-weight:700;color:var(--secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}.footer-link{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(139,92,246,0.15);border:1px solid var(--secondary);border-radius:8px;color:var(--secondary);text-decoration:none;font-weight:700;font-size:14px;transition:all 0.3s ease}.footer-link:hover{background:var(--secondary);color:var(--bg-primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(139,92,246,0.4)}.footer-link svg{width:16px;height:16px;fill:currentColor}.copyright{margin-top:12px;font-size:12px;color:var(--text-secondary);opacity:0.6}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,35,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:12px 0;z-index:1000}.nav-item{background:none;border:none;color:var(--text-secondary);font-size:20px;padding:8px;border-radius:8px;cursor:pointer;transition:all 0.2s ease;text-decoration:none;display:flex;align-items:center;justify-content:center}.nav-item:hover{color:var(--primary);transform:translateY(-2px)}.nav-item.active{color:var(--primary)}.icon{display:inline-block;width:20px;height:20px;fill:currentColor}@media (max-width:480px){.container{padding:16px 12px 100px}.apps-grid{grid-template-columns:repeat(2,1fr)}.app-icon{width:40px;height:40px;font-size:20px}.app-name{font-size:12px}}
