<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex Critic</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --red:   #e8354a;
      --cream: #f0ede6;
      --muted: rgba(240,237,230,0.45);
      --glass: rgba(240,237,230,0.04);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--black);
      cursor: none;
      position: relative;
    }

    /* ── Grain ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 900;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(232,53,74,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.25s, height 0.25s, border-color 0.25s;
    }
    body.hovering .cursor-ring {
      width: 52px; height: 52px;
      border-color: var(--red);
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 800;
    }

    /* ── Decorative vinyl ── */
    .bg-vinyl {
      position: fixed;
      width: min(600px, 60vw);
      height: min(600px, 60vw);
      right: min(-120px, -10vw);
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%,
          #1a1a1a 0%, #111 18%, #0d0d0d 18.5%,
          #222 19%, #0d0d0d 25%, #1a1a1a 25.5%,
          #111 32%, #0d0d0d 32.5%, #222 33%, #0d0d0d 55%),
        conic-gradient(from 0deg, #181818, #1e1e1e, #141414, #1e1e1e, #181818);
      border: 2px solid #2a2a2a;
      animation: spinVinyl 20s linear infinite;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .bg-vinyl::after {
      content: '';
      position: absolute;
      inset: 43%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--red) 0%, #7a1020 100%);
    }
    @keyframes spinVinyl { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Red left bar ── */
    .accent-bar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent, var(--red) 25%, var(--red) 75%, transparent);
      z-index: 100;
    }

    /* ── Ghost number ── */
    .bg-number {
      position: fixed;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(140px, 22vw, 300px);
      color: rgba(232,53,74,0.03);
      bottom: -0.1em; left: -0.05em;
      pointer-events: none;
      z-index: 0;
      line-height: 1;
      user-select: none;
    }

    /* ── Stage: strict 100vh, 3-row grid ── */
    .stage {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(1rem, 3vh, 2.4rem) clamp(1.4rem, 5vw, 4rem);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeDown 0.6s 0.1s ease forwards;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(240,237,230,0.12);
      padding: 0.45rem 0.95rem;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--cream); border-color: rgba(240,237,230,0.35); }
    .back-btn svg { width: 13px; height: 13px; fill: currentColor; }

    .issue-tag {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .issue-tag span { color: var(--red); }

    /* ── Hero (flex-centered in the 1fr row) ── */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 620px;
      padding: 0;
    }

    .pre-label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: clamp(0.5rem, 1.5vh, 1.1rem);
      opacity: 0;
      animation: fadeUp 0.6s 0.35s ease forwards;
    }
    .pre-label::before {
      content: '';
      width: 26px; height: 1px;
      background: var(--red);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.8rem, 10vw, 8rem);
      line-height: 0.88;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.7s 0.5s ease forwards;
    }
    .logo .ex     { color: var(--red); display: block; }
    .logo .critic {
      display: block;
      -webkit-text-stroke: 1px rgba(240,237,230,0.45);
      -webkit-text-fill-color: transparent;
    }

    .slogan {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.8vw, 1.2rem);
      color: var(--muted);
      line-height: 1.5;
      margin-top: clamp(0.6rem, 1.8vh, 1.4rem);
      margin-bottom: clamp(1rem, 3vh, 2.5rem);
      max-width: 340px;
      opacity: 0;
      animation: fadeUp 0.6s 0.7s ease forwards;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s 0.85s ease forwards;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.85rem 1.9rem;
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      letter-spacing: 0.08em;
      border-radius: 3px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      white-space: nowrap;
    }
    .btn-songs {
      background: var(--red);
      color: var(--cream);
    }
    .btn-songs:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(232,53,74,0.4);
    }
    .btn-albums {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(240,237,230,0.2);
    }
    .btn-albums:hover {
      transform: translateY(-4px);
      border-color: rgba(240,237,230,0.55);
      background: var(--glass);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .btn:hover::before { left: 160%; }
    .btn-icon {
      width: 17px; height: 17px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Footer ticker ── */
    .footer-strip {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s 1s ease forwards;
      min-width: 0;
    }
    .ticker {
      flex: 1;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
      min-width: 0;
    }
    .ticker-inner {
      display: flex;
      gap: 2.5rem;
      white-space: nowrap;
      animation: tickerScroll 20s linear infinite;
    }
    .ticker-item {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .ticker-item .dot { color: var(--red); margin-right: 0.35rem; }
    @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .vol-badge {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(240,237,230,0.1);
      padding: 0.28rem 0.75rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .bg-vinyl { opacity: 0.22; }
      .issue-tag, .vol-badge { display: none; }
      .buttons { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="scanlines"></div>
  <div class="bg-vinyl"></div>
  <div class="accent-bar"></div>
  <div class="bg-number">01</div>

  <div class="stage">

    <header class="header">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back
      </a>
      <div class="issue-tag">Vol. I &nbsp;·&nbsp; <span>Music Criticism Platform</span></div>
    </header>

    <main class="hero">
      <div class="pre-label">Honest Reviews</div>
      <h1 class="logo">
        <span class="ex">Ex</span>
        <span class="critic">Critic</span>
      </h1>
      <p class="slogan">What people truly think of your music — unfiltered, direct, real.</p>
      <div class="buttons">
        <a href="Oex critic.html" class="btn btn-songs">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
          Songs
        </a>
        <a href="ma.html" class="btn btn-albums">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
          </svg>
          Albums
        </a>
      </div>
    </main>

    <footer class="footer-strip">
      <div class="ticker"><div class="ticker-inner" id="tickerInner"></div></div>
      <div class="vol-badge">EX CRITIC © 2025</div>
    </footer>

  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function loop() {
      rx += (mx - rx) * 0.14; ry += (my - ry) * 0.14;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(loop);
    })();
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    // Ticker
    const words = ['Songs','Albums','Critics','Reviews','Ratings','Tracks','EPs','Singles','Releases','Mixes'];
    const ti = document.getElementById('tickerInner');
    [...words,...words].forEach(w => {
      const d = document.createElement('div');
      d.className = 'ticker-item';
      d.innerHTML = `<span class="dot">▸</span>${w}`;
      ti.appendChild(d);
    });

    // Ripple
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const r = document.createElement('span');
        const rect = this.getBoundingClientRect();
        const sz = Math.max(rect.width, rect.height) * 2;
        r.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px;border-radius:50%;background:rgba(255,255,255,0.13);transform:scale(0);animation:rpl 0.55s ease-out forwards;pointer-events:none;`;
        this.appendChild(r);
        setTimeout(() => r.remove(), 600);
      });
    });
    const s = document.createElement('style');
    s.textContent = '@keyframes rpl{to{transform:scale(1);opacity:0}}';
    document.head.appendChild(s);
  </script>
</body>
</html>
