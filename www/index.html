
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Excellence - Launching</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        bgPrimary: '#101223',
                        bgSecondary: '#161936',
                        bgTertiary: '#0b0c16',
                        brandPrimary: '#6d74ff',
                        brandSecondary: '#a56eff',
                        brandAccent: '#06B6D4'
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0e1124 0%, #151833 50%, #0a0b14 100%);
            color: #FFFFFF;
            touch-action: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
        }

        @keyframes rotate-vinyl {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .animate-spin-vinyl {
            animation: rotate-vinyl 0.5s linear infinite;
        }

        .animate-spin-slow {
            animation: rotate-vinyl 6s linear infinite;
        }

        .text-glow {
            text-shadow: 0 0 25px rgba(109, 116, 255, 0.6);
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative">

    <!-- Ambient Background Glows -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[10%] left-[10%] w-[80%] h-[50%] bg-brandPrimary/10 rounded-full blur-[100px] animate-pulse-slow"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[80%] h-[50%] bg-brandSecondary/10 rounded-full blur-[100px] animate-pulse-slow" style="animation-delay: 2s;"></div>
    </div>

    <!-- Main Scene Wrapper -->
    <div id="scene" class="relative w-full h-full flex flex-col items-center justify-center z-10">

        <!-- Vinyl & Sleeve Container -->
        <!-- Sized specifically for mobile friendliness -->
        <div id="record-container" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-44 h-44 sm:w-56 sm:h-56 pointer-events-none z-50">
            
            <!-- The Sleeve -->
            <div id="sleeve" class="absolute inset-0 z-20 rounded-lg glass-panel overflow-hidden transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.3,1)] origin-center">
                <div class="absolute inset-0 bg-bgPrimary/40"></div>
                <div class="absolute -top-1/2 -right-1/2 w-full h-full bg-[radial-gradient(circle,#a56eff,transparent_60%)] opacity-40"></div>
                <div class="absolute -bottom-1/2 -left-1/2 w-full h-full bg-[radial-gradient(circle,#6d74ff,transparent_60%)] opacity-40"></div>
                
                <div class="absolute inset-2 rounded-full border border-white/5 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]"></div>
                
                <div class="absolute bottom-4 left-4">
                    <h2 class="text-white font-black text-lg leading-none tracking-tight">MUSIC<br/>EXCELLENCE</h2>
                </div>
            </div>

            <!-- The Vinyl Record -->
            <div id="vinyl-mover" class="absolute inset-0 z-[60] transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.3,1)]">
                <!-- Inner rotator to separate translation from rotation -->
                <div id="vinyl-rotator" class="w-full h-full">
                    <svg viewBox="0 0 200 200" class="w-full h-full drop-shadow-[0_10px_25px_rgba(0,0,0,0.8)]">
                        <defs>
                            <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#111" />
                                <stop offset="50%" stop-color="#1f1f1f" />
                                <stop offset="100%" stop-color="#050505" />
                            </linearGradient>
                            <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#6d74ff" />
                                <stop offset="100%" stop-color="#a56eff" />
                            </linearGradient>
                            <linearGradient id="shine" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                                <stop offset="45%" stop-color="rgba(255,255,255,0.05)" />
                                <stop offset="50%" stop-color="rgba(255,255,255,0.2)" />
                                <stop offset="55%" stop-color="rgba(255,255,255,0.05)" />
                                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                            </linearGradient>
                        </defs>
                        
                        <!-- Base Disc -->
                        <circle cx="100" cy="100" r="98" fill="url(#vGrad)" stroke="#333" stroke-width="1"/>
                        <circle cx="100" cy="100" r="98" fill="url(#shine)" />
                        
                        <!-- Grooves -->
                        <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                        <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
                        <circle cx="100" cy="100" r="50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                        
                        <!-- Center Label -->
                        <circle cx="100" cy="100" r="30" fill="url(#lGrad)"/>
                        <circle cx="100" cy="100" r="5" fill="#151833"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Logo Reveal Container -->
        <div id="logo-container" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-[20%] opacity-0 z-20 flex flex-col items-center pointer-events-none transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.3,1)]">
            
            <div class="relative flex items-baseline justify-center">
                <!-- Red Swoosh over the "sic" -->
                <svg class="absolute -top-[0.2em] right-0 w-[1.8em] h-[1.2em] text-red-500 opacity-80 pointer-events-none z-10 drop-shadow-[0_0_5px_rgba(239,68,68,0.5)]" viewBox="0 0 100 50">
                    <path d="M10,40 Q35,-5 85,15 T95,35" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>

                <!-- Primary Text: Music -->
                <div class="text-5xl sm:text-6xl md:text-7xl font-black tracking-tighter flex items-baseline text-transparent bg-clip-text bg-gradient-to-br from-[#8b91ff] via-[#b68cff] to-[#5edef2] text-glow relative z-20">
                    <span>M</span><span>u</span><span>s</span>
                    
                    <!-- The exact docking target point for the dotless "i" -->
                    <span class="relative flex flex-col items-center justify-end mx-[0.02em]">
                        <!-- Scaled exact target area -->
                        <div id="vinyl-target" class="absolute -top-[0.08em] w-[0.22em] h-[0.22em] rounded-full"></div>
                        <!-- Dotless i -->
                        <span class="text-transparent bg-clip-text bg-gradient-to-br from-[#8b91ff] via-[#b68cff] to-[#5edef2]">ı</span>
                    </span>
                    
                    <span>c</span>
                </div>
            </div>
            
            <!-- Secondary Text: EXCELLENCE -->
            <div class="text-sm sm:text-base md:text-lg font-bold text-white tracking-[0.4em] uppercase mt-2 drop-shadow-xl opacity-90">
                Excellence
            </div>
        </div>

        <!-- Interactive Play Button -->
        <div id="play-btn-wrapper" class="absolute bottom-20 md:bottom-28 opacity-0 translate-y-8 z-40 transition-all duration-700 ease-out delay-200">
            <button id="play-btn" class="relative group cursor-pointer focus:outline-none">
                <!-- Outer Hover Glow exactly like the screenshot -->
                <div class="absolute -inset-4 bg-gradient-to-r from-blue-600 via-indigo-500 to-cyan-500 rounded-full blur-xl opacity-60 group-hover:opacity-100 transition duration-300"></div>
                
                <!-- Inner Dark Pill Button -->
                <div class="relative bg-[#0d0f1c] px-10 py-3.5 rounded-full flex items-center justify-center gap-3 border border-white/5 transition-transform duration-300 group-hover:scale-105 group-active:scale-95 shadow-inner">
                    <span class="text-white font-bold text-sm sm:text-base uppercase tracking-[0.25em] ml-1">Play</span>
                    <svg class="w-5 h-5 text-white group-hover:translate-x-1.5 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </div>
            </button>
        </div>

        <!-- Footer -->
        <div id="footer" class="absolute bottom-6 text-white/30 font-mono text-[10px] sm:text-xs tracking-[0.3em] opacity-0 transition-opacity duration-1000 uppercase">
            Version: 2.12
        </div>

    </div>

    <!-- Animation Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // DOM Elements
            const sleeve = document.getElementById('sleeve');
            const mover = document.getElementById('vinyl-mover');
            const rotator = document.getElementById('vinyl-rotator');
            const logoContainer = document.getElementById('logo-container');
            const target = document.getElementById('vinyl-target');
            const playWrapper = document.getElementById('play-btn-wrapper');
            const playBtn = document.getElementById('play-btn');
            const footer = document.getElementById('footer');
            
            // State flags
            let isDocked = false;

            // Orchestrate Timeline
            setTimeout(() => {
                // T=0.5s: Sleeve tilts back (3D perspective), Vinyl slides out to the right
                sleeve.style.transform = 'perspective(1000px) rotateY(-15deg) rotateX(5deg) scale(0.95)';
                sleeve.style.boxShadow = '20px 20px 50px rgba(0,0,0,0.8)';
                
                // Extract vinyl slightly to the right
                mover.style.transform = 'translate(55%, -10%) rotate(90deg)';
            }, 500);

            setTimeout(() => {
                // T=2.0s: Sleeve drops away & fades out
                sleeve.style.opacity = '0';
                sleeve.style.transform = 'translateY(60px) scale(0.8) perspective(1000px) rotateX(20deg)';

                // Vinyl returns to dead center and spins up rapidly
                mover.style.transform = 'translate(0, 0) rotate(0deg)';
                rotator.classList.add('animate-spin-vinyl');
                
                // Add an intense glowing aura during loading
                rotator.querySelector('svg').style.filter = 'drop-shadow(0 0 35px rgba(109, 116, 255, 0.7))';
            }, 2000);

            setTimeout(() => {
                // T=4.5s: Loading simulated complete.
                // Logo reveals from below to dead center
                logoContainer.style.opacity = '1';
                logoContainer.style.transform = 'translate(-50%, -50%)'; 
                
                // Slow down the vinyl spin
                rotator.classList.remove('animate-spin-vinyl');
                rotator.classList.add('animate-spin-slow');
            }, 4500);

            setTimeout(() => {
                // T=5.5s: The Snap.
                // Calculate precise offset to position vinyl perfectly over the "i" dot.
                dockVinyl();
                isDocked = true;
            }, 5500);

            setTimeout(() => {
                // T=6.5s: Final UI fades in
                playWrapper.style.opacity = '1';
                playWrapper.style.transform = 'translateY(0)';
                footer.style.opacity = '1';
            }, 6500);

            // Calculation function to move the vinyl to the exact target
            function dockVinyl() {
                // Container is Top-1/2 Left-1/2 translated by -50%, -50%
                const screenCenterX = window.innerWidth / 2;
                const screenCenterY = window.innerHeight / 2;
                
                const targetRect = target.getBoundingClientRect();
                const targetCenterX = targetRect.left + targetRect.width / 2;
                const targetCenterY = targetRect.top + targetRect.height / 2;

                // How much do we need to shift from true center?
                const dx = targetCenterX - screenCenterX;
                const dy = targetCenterY - screenCenterY;
                
                // How much do we scale down?
                // The base container is w-44 (176px) or w-56 (224px).
                const scale = targetRect.width / mover.offsetWidth;

                // Adjust transition for a snappy, precise docking feeling
                mover.style.transition = 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                
                // Apply final transform (keep z-index high so it sits on top of text)
                mover.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
                
                // Subdue the glow so it blends perfectly as the dot
                rotator.querySelector('svg').style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.8))';
            }

            // Keep the dot perfectly aligned if the user resizes the browser
            window.addEventListener('resize', () => {
                if (isDocked) {
                    mover.style.transition = 'none'; // Instant snap
                    dockVinyl();
                }
            });

            // Cinematic Exit Transition to Game
            playBtn.addEventListener('click', () => {
                // Prevent double clicks
                playBtn.disabled = true;

                // Scale up the entire body and fade to black
                document.body.style.transition = 'transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), background-color 0.6s ease';
                document.body.style.transform = 'scale(1.3)';
                document.body.style.backgroundColor = '#000000';
                
                // Fade out UI smoothly
                document.getElementById('scene').style.transition = 'opacity 0.6s ease';
                document.getElementById('scene').style.opacity = '0';

                // Redirect to main game file after animation completes
                setTimeout(() => {
                    window.location.href = 'music.html';
                }, 750);
            });
        });
    </script>
</body>
</html>
