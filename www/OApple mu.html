
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Apple Music</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{--primary:#ff2d55;--bg:#000;--text:#fff;--secondary:#86868b;--card:#1c1c1e;--border:rgba(255,255,255,.1);--glass:rgba(0,0,0,.8);--gradient:linear-gradient(135deg, #ff2d55, #ff6b85)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-weight:600}
.page{display:none;padding-bottom:100px;animation:fadeUp .5s ease}
.page.active{display:block}
#profile-page{background:var(--page-bottom,#1a1a1a)}
.nav{position:fixed;top:0;left:0;right:0;height:36px;background:var(--glass);backdrop-filter:blur(20px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border)}
.nav-btn{width:28px;height:28px;background:none;border:none;color:var(--text);display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.3s}
.nav-btn:hover{background:var(--border);transform:scale(1.1)}

/* --- Profile Page --- */
.hero{margin-top:0;position:relative;height:55vh;min-height:380px;max-height:520px;overflow:hidden;background:var(--page-bottom,#1a1a1a)}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 30%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.88) 85%, var(--page-bottom,#1a1a1a) 100%);pointer-events:none;z-index:1}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center top;cursor:pointer;display:block}
.artist-info{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 32px;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center}
.artist-name{font-size:clamp(32px,9vw,52px);font-weight:800;text-shadow:0 2px 24px rgba(0,0,0,.9);letter-spacing:-0.5px}
.play-btn{width:54px;height:54px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;background:#fff;color:#111}
.artist-action-row{display:flex;align-items:center;gap:20px}
.artist-icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
.play-btn:hover{transform:scale(1.1)}
.content{padding:0 20px;max-width:1200px;margin:0 auto;position:relative;z-index:2;background:transparent}
.section{margin:32px 0;opacity:0;animation:fadeUp .8s ease forwards}
.section:nth-child(2){animation-delay:.1s}
.section:nth-child(3){animation-delay:.2s}
.section:nth-child(4){animation-delay:.3s}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.section-title{font-size:22px;font-weight:800}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);transition:.3s;overflow:hidden}
.card:hover{background:#2c2c2e}
.latest-release{background:transparent;border:none;padding:0;display:flex;align-items:center;gap:18px;cursor:pointer}
.release-cover{width:100px;height:100px;border-radius:10px;object-fit:cover;flex-shrink:0}
.release-info{flex:1}
.release-title{font-size:20px;font-weight:700;margin-bottom:4px}
.release-meta{font-size:12px;color:var(--secondary);font-weight:500;margin-bottom:4px;text-transform:uppercase}
.release-songs{font-size:14px;color:var(--secondary);font-weight:600;margin-bottom:10px}

/* --- Top Songs Vertical List (Profile) --- */
.songs-container { overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
.songs-container::-webkit-scrollbar { display: none; }
.songs-list { display: flex; gap: 16px; }
.song-page-list { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; width: 100%; scroll-snap-align: start; }
.top-song-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; cursor: pointer; transition: background .2s; border-radius: 6px; }
.top-song-item:hover { background: #111; }
.top-song-cover { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.top-song-info { flex: 1; min-width: 0; }
.top-song-title { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
.top-song-streams { font-size: 13px; color: var(--secondary); font-weight: 500; }

/* Albums (Profile) */
.albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px}
.album-card{cursor:pointer;transition:.3s;padding:12px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.album-card:hover{background:#2c2c2e;transform:translateY(-3px)}
.album-cover{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;margin-bottom:10px}
.album-title{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.album-year{color:var(--secondary);font-size:11px;font-weight:600}

/* --- Apple Music Charts Page --- */
.chart-top-bar { display: flex; justify-content: space-between; align-items: flex-end; padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px; }
.chart-main-title { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
.chart-genre { color: var(--primary); font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 4px; cursor: pointer; }

.am-chart-view { padding: 0 16px 20px; }

/* Explicit Badge */
.explicit-badge { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.25); color: #fff; font-size: 9px; width: 14px; height: 14px; border-radius: 3px; font-weight: 800; margin-left: 6px; flex-shrink: 0; }

/* Chart Songs List */
.am-chart-song { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
.am-chart-song:last-child { border-bottom: none; }
.am-chart-song:hover { background: rgba(255,255,255,0.03); }
.am-chart-cover { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
.am-chart-rank { width: 28px; font-size: 16px; font-weight: 600; text-align: center; flex-shrink: 0; color: var(--text); margin-left: 12px; }
.am-chart-info { flex: 1; margin-left: 14px; min-width: 0; }
.am-chart-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }
.am-chart-artist { font-size: 13px; color: var(--secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.am-chart-more { color: var(--secondary); font-size: 20px; padding: 0 5px; display: flex; align-items: center; justify-content: center; letter-spacing: 2px; }

/* Chart Albums Grid */
.am-chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 12px; }
.am-chart-album { display: flex; flex-direction: column; cursor: pointer; width: 100%; }
.am-chart-album:hover .am-chart-album-cover { opacity: 0.8; }
.am-chart-album-cover { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 6px; transition: .2s; display: block; }
.am-chart-album-rank { font-size: 13px; font-weight: 800; margin-bottom: 2px; color: var(--text); }
.am-chart-album-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.am-chart-album-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.am-chart-album-artist { font-size: 12px; color: var(--secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- Bottom Nav --- */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 20px;color:var(--secondary);cursor:pointer;transition:.2s;flex-grow:1}
.nav-item.active{color:var(--primary)}
.nav-item svg{width:24px;height:24px;margin-bottom:3px}
.nav-item span{font-size:10px;font-weight:700}
input[type="file"]{display:none}

/* --- Modals --- */
.album-modal{position:fixed;inset:0;background:var(--am-bg,#c9a882);z-index:1000;opacity:0;visibility:hidden;transition:background 0.5s ease, opacity .3s, visibility .3s;overflow-y:auto}
.album-modal.active{opacity:1;visibility:visible}
.album-content{max-width:600px;margin:0 auto}
.am-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;position:sticky;top:0;z-index:10}
.am-topbar-btn{width:36px;height:36px;background:rgba(0,0,0,0.12);border:none;border-radius:50%;color:var(--am-text-primary,#1a0a00);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.am-topbar-btn:hover{background:rgba(0,0,0,0.22)}
.am-topbar-right{display:flex;gap:8px}
.am-cover-section{padding:20px 20px 12px;display:flex;justify-content:center}
.am-cover-img{width:210px;height:210px;border-radius:14px;object-fit:cover;box-shadow:0 12px 36px rgba(0,0,0,0.35)}
.am-info{text-align:center;padding:14px 20px 0}
.am-title{font-size:26px;font-weight:800;color:var(--am-text-primary,#1a0a00);line-height:1.15}
.am-artist{font-size:18px;color:var(--am-text-secondary,#5c3d1e);margin-top:3px;font-weight:500}
.am-meta{font-size:12px;color:var(--am-text-meta,#7a5a3a);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;font-weight:600}
.am-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin:18px 20px 0}
.am-shuffle-btn,.am-check-btn{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,0.14);border:none;color:var(--am-text-primary,#1a0a00);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.am-play-btn{flex:1;max-width:220px;height:50px;border-radius:25px;background:var(--am-play-bg,#1a0a00);color:var(--am-play-text,#fff);border:none;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.2s}
.am-songs-section{margin-top:20px;padding-bottom:40px}
.am-song-item{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid rgba(0,0,0,0.1);cursor:pointer;transition:.15s;gap:10px}
.am-song-item:first-child{border-top:1px solid rgba(0,0,0,0.1)}
.am-song-num{width:20px;font-size:15px;color:var(--am-text-meta,#7a5a3a);font-weight:500;flex-shrink:0}
.am-song-name{flex:1;font-size:16px;color:var(--am-text-primary,#1a0a00);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Artist Name Font Effects */
.artist-name.font-neon{text-shadow:0 0 8px #fff,0 0 24px #ff2d55,0 0 48px #ff2d55;letter-spacing:2px}
.artist-name.font-chrome{background:linear-gradient(180deg,#fff 0%,#aaa 50%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.artist-name.font-gold{background:linear-gradient(135deg,#f7d47a,#c8860a,#f7d47a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.artist-name.font-outline{-webkit-text-stroke:2px #fff;color:transparent;text-shadow:none}
.artist-name.font-glitch{animation:glitch 1.5s infinite}
@keyframes glitch{0%,100%{text-shadow:2px 0 #ff2d55,-2px 0 #0ff}25%{text-shadow:-2px 0 #ff2d55,2px 0 #0ff}50%{text-shadow:2px 0 #0ff,-2px 0 #ff2d55}}

/* Settings modal */
.settings-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:flex-end;opacity:0;visibility:hidden;transition:.3s}
.settings-modal.active{opacity:1;visibility:visible}
.settings-sheet{background:#1c1c1e;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:70vh;overflow-y:auto}
.settings-title{font-size:18px;font-weight:800;margin-bottom:20px}
.font-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.font-option{background:#2c2c2e;border-radius:10px;padding:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.2s}
.font-option.selected{border-color:var(--primary)}
.font-option span{font-size:13px;font-weight:700;display:block;margin-bottom:4px}
.font-option small{font-size:10px;color:var(--secondary)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
    .hero{height:250px}
    /* You can make the minimum size slightly smaller for mobile if you want 3 columns */
    .am-chart-grid{grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px;}
    .top-song-cover{width:44px;height:44px}
}

</style>
</head>
<body>

<!-- CHARTS PAGE -->
<div id="charts-page" class="page">
    <div class="chart-top-bar">
        <h1 class="chart-main-title" id="chart-page-title">Top Songs</h1>
        <div class="chart-genre" id="chart-toggle-btn" onclick="toggleChartType()">
            Albums <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
    </div>

    <!-- Top Songs View -->
    <div id="am-songs-view" class="am-chart-view active">
        <div id="am-songs-list">
            <!-- Dynamically injected -->
        </div>
    </div>

    <!-- Top Albums View -->
    <div id="am-albums-view" class="am-chart-view" style="display: none;">
        <div class="am-chart-grid" id="am-albums-grid">
            <!-- Dynamically injected -->
        </div>
    </div>
</div>

<!-- PROFILE PAGE -->
<div id="profile-page" class="page">
    <div class="nav">
        <button class="nav-btn" onclick="showPage('charts-page')">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="nav-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
    </div>

    <div class="hero" id="hero-wrap">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800&h=600&fit=crop" class="hero-img" id="hero-img">
        <input type="file" id="hero-input" accept="image/*">
        <div class="artist-info">
            <div id="upcoming-concerts-pill" style="display:none;background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:#fff;display:none;align-items:center;gap:6px;cursor:pointer;" onclick="openUpcomingTours()">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M18 3H6c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H6V5h12v14zM8 11h8v2H8zm0 4h5v2H8zM8 7h8v2H8z"/></svg>
                Upcoming Concerts
            </div>
            <h1 class="artist-name" id="artist-name">Artist Name</h1>
            <div class="artist-action-row">
                <button class="artist-icon-btn" title="Info">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </button>
                <button class="play-btn" onclick="playAll()" title="Play">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="artist-icon-btn" title="Favorite">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="section" id="latest-release-section">
            <div class="section-header">
                <h2 class="section-title">New Release</h2>
            </div>
            <div class="latest-release" id="latest-release"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Top Songs</h2>
            </div>
            <div class="songs-container">
                <div class="songs-list" id="songs-list"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Albums</h2>
            </div>
            <div class="albums-grid" id="albums-grid"></div>
        </div>
    </div>
</div>

<div class="album-modal" id="album-modal">
    <div class="album-content" id="album-content"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" id="nav-profile">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>Profile</span>
    </div>
    <div class="nav-item active" id="nav-charts">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        <span>Charts</span>
    </div>
</div>

<div class="settings-modal" id="settings-modal" onclick="if(event.target===this)closeSettings()">
    <div class="settings-sheet">
        <div class="settings-title">Artist Name Style</div>
        <div class="font-grid" id="font-grid">
            <div class="font-option selected" onclick="setArtistFont('')" data-font=""><span style="font-size:16px">Aa</span><small>Default</small></div>
            <div class="font-option" onclick="setArtistFont('font-neon')" data-font="font-neon"><span style="font-size:16px;text-shadow:0 0 8px #fff,0 0 16px #ff2d55">Aa</span><small>Neon</small></div>
            <div class="font-option" onclick="setArtistFont('font-chrome')" data-font="font-chrome"><span style="font-size:16px;background:linear-gradient(180deg,#fff 0%,#999 50%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Aa</span><small>Chrome</small></div>
            <div class="font-option" onclick="setArtistFont('font-gold')" data-font="font-gold"><span style="font-size:16px;background:linear-gradient(135deg,#f7d47a,#c8860a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Aa</span><small>Gold</small></div>
            <div class="font-option" onclick="setArtistFont('font-outline')" data-font="font-outline"><span style="font-size:16px;-webkit-text-stroke:1.5px #fff;color:transparent">Aa</span><small>Outline</small></div>
            <div class="font-option" onclick="setArtistFont('font-glitch')" data-font="font-glitch"><span style="font-size:16px;text-shadow:2px 0 #ff2d55,-2px 0 #0ff">Aa</span><small>Glitch</small></div>
        </div>
    </div>
</div>

<script>
// --- DB Setup ---
const photoDB = (function() {
    const DB_NAME = 'MusicGameDB';
    const STORE = 'photos';
    const KEY = 'artistPhoto';
    function open() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });
    }
    return {
        save(dataUrl) {
            return open().then(db => new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).put(dataUrl, KEY);
                tx.oncomplete = resolve;
                tx.onerror = e => reject(e.target.error);
            }));
        },
        load() {
            return open().then(db => new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readonly');
                const req = tx.objectStore(STORE).get(KEY);
                req.onsuccess = e => resolve(e.target.result || null);
                req.onerror = e => reject(e.target.error);
            }));
        }
    };
})();

// --- Helper Functions ---
const getSongs = () => {
    const mySongs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
    const collabs = JSON.parse(localStorage.getItem('acceptedCollaborations') || '[]');
    return [...mySongs, ...collabs].filter(s => s?.songName);
};
const getAlbums = () => JSON.parse(localStorage.getItem('releasedAlbums')||'[]').filter(a=>a?.name);

function formatLargeNumber(n){
    if(!n)return'0';
    if(n>=1e9)return(n/1e9).toFixed(1)+'B';
    if(n>=1e6)return(n/1e6).toFixed(1)+'M';
    if(n>=1e3)return(n/1e3).toFixed(1)+'K';
    return n.toString();
}

// --- CHARTS LOGIC ---
function getAppleCharts() {
    const currentWeek = localStorage.getItem('currentWeek') || '1';
    let cache = JSON.parse(localStorage.getItem('apple_charts_cache') || '{}');

    // Only regenerate the shuffle if the in-game week changes
    if (cache.week !== currentWeek || !cache.songs || !cache.albums) {
        const realArtistName = JSON.parse(localStorage.getItem('artistDetails') || '{}').name || 'Unknown Artist';
        
        let mainSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
        let appleSongs = mainSongs.map(s => {
            // Fix formatting for User songs
            let dArtist = s.artist === 'YOU' ? realArtistName : (s.artist.startsWith('YOU ft.') ? s.artist.replace('YOU', realArtistName) : s.artist);
            return {
                ...s,
                artist: dArtist,
                // Realistic Apple Music Shuffle: Multiplies streams by 0.75 - 1.25 to shift ranks slightly
                appleScore: (s.streams || s.weeklyStreams || 0) * (0.75 + Math.random() * 0.5),
                // Give some songs an explicit badge randomly for realism
                isExplicit: Math.random() > 0.4
            };
        }).sort((a, b) => b.appleScore - a.appleScore).slice(0, 100);
        
        appleSongs.forEach((s, i) => s.rank = i + 1);

        let mainAlbums = JSON.parse(localStorage.getItem('chart_albums_final') || '[]');
        let appleAlbums = mainAlbums.map(a => {
            let dArtist = a.artist === 'YOU' ? realArtistName : a.artist;
            return {
                ...a,
                artist: dArtist,
                appleScore: (a.units || 0) * (0.75 + Math.random() * 0.5),
                isExplicit: Math.random() > 0.4
            };
        }).sort((a, b) => b.appleScore - a.appleScore).slice(0, 200);

        appleAlbums.forEach((a, i) => a.rank = i + 1);

        cache = { week: currentWeek, songs: appleSongs, albums: appleAlbums };
        localStorage.setItem('apple_charts_cache', JSON.stringify(cache));
    }
    return cache;
}

function loadChartsPage() {
    const chartsData = getAppleCharts();
    const songsList = document.getElementById('am-songs-list');
    const albumsGrid = document.getElementById('am-albums-grid');

    // Render Songs
    if (chartsData.songs.length === 0) {
        songsList.innerHTML = '<div style="color:var(--secondary); padding:20px; text-align:center;">Charts are updating...</div>';
    } else {
        songsList.innerHTML = chartsData.songs.map(song => `
            <div class="am-chart-song" onclick="playSong('${song.title.replace(/'/g, "\\'")}')">
                <img class="am-chart-cover" src="${song.art || 'https://placehold.co/100'}">
                <div class="am-chart-rank">${song.rank}</div>
                <div class="am-chart-info">
                    <div class="am-chart-title">
                        ${song.title} 
                        ${song.isExplicit ? '<span class="explicit-badge">E</span>' : ''}
                    </div>
                    <div class="am-chart-artist">${song.artist}</div>
                </div>
                <div class="am-chart-more">•••</div>
            </div>

    }

    // Render Albums
    if (chartsData.albums.length === 0) {
        albumsGrid.innerHTML = '<div style="color:var(--secondary); padding:20px; text-align:center; grid-column:1/-1;">Charts are updating...</div>';
    } else {
        albumsGrid.innerHTML = chartsData.albums.map(album => `
            <div class="am-chart-album" onclick="alert('Viewing Album: ${album.title.replace(/'/g, "\\'")}')">
                <img class="am-chart-album-cover" src="${album.art || 'https://placehold.co/200'}">
                <div class="am-chart-album-rank">${album.rank}</div>

                    <div class="am-chart-album-title">${album.title}</div>
                    ${album.isExplicit ? '<span class="explicit-badge">E</span>' : ''}

                <div class="am-chart-album-artist">${album.artist}</div>
            </div>
        `).join('');
    }
}

// --- PROFILE PAGE LOADERS ---
function extractHeroColor(imgEl) {
    try {
        const canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, 200, 200);

        // Sample ONLY the bottom 20% of the image — that's what bleeds into the page
        const bottomStrip = ctx.getImageData(0, 160, 200, 40).data;
        let r=0,g=0,b=0,count=0;
        for(let i=0;i<bottomStrip.length;i+=4){
            r+=bottomStrip[i];g+=bottomStrip[i+1];b+=bottomStrip[i+2];count++;
        }
        r=Math.floor(r/count);g=Math.floor(g/count);b=Math.floor(b/count);

        // Keep the hue but make it dark — like a deep tinted shadow, not a bright wash
        const avg = (r+g+b)/3;
        const sat = 1.4;
        r = Math.min(255, Math.floor(avg + (r-avg)*sat));
        g = Math.min(255, Math.floor(avg + (g-avg)*sat));
        b = Math.min(255, Math.floor(avg + (b-avg)*sat));
        // Darken significantly so it's a deep moody tint, not a bright color
        r = Math.floor(r * 0.35);
        g = Math.floor(g * 0.35);
        b = Math.floor(b * 0.35);

        const profilePage = document.getElementById('profile-page');
        const pageColor = `rgb(${r},${g},${b})`;
        document.documentElement.style.setProperty('--page-bottom', pageColor);
        profilePage.style.setProperty('--page-bottom', pageColor);
        profilePage.style.background = `linear-gradient(to bottom, rgb(${Math.min(r*2,80)},${Math.min(g*2,80)},${Math.min(b*2,80)}) 0%, ${pageColor} 40%, #0a0a0a 75%, #000 100%)`;
    } catch(e) {}
}

function loadArtist(){
    const d=JSON.parse(localStorage.getItem('artistDetails')||'{}');
    document.getElementById('artist-name').textContent=d.name||'Artist Name';
    const applyColor = (src) => {
        const tmp = new Image();
        tmp.crossOrigin='anonymous';
        tmp.onload = () => extractHeroColor(tmp);
        tmp.src = src;
    };
    photoDB.load().then(dataUrl=>{
        if(dataUrl){ document.getElementById('hero-img').src=dataUrl; applyColor(dataUrl); }
        else { const p=localStorage.getItem('artistPhoto'); if(p){ document.getElementById('hero-img').src=p; applyColor(p); } }
    }).catch(()=>{ const p=localStorage.getItem('artistPhoto'); if(p){ document.getElementById('hero-img').src=p; applyColor(p); } });
    checkUpcomingTours();
}

function checkUpcomingTours() {
    const tours = JSON.parse(localStorage.getItem('activeTours') || '[]');
    const pill = document.getElementById('upcoming-concerts-pill');
    if (!pill) return;
    const now = JSON.parse(localStorage.getItem('gameState') || '{}').currentWeek || 0;
    const upcoming = tours.filter(t => t.status === 'upcoming' || t.status === 'active' || (t.startWeek && t.startWeek >= now));
    if (upcoming.length > 0) {
        pill.style.display = 'flex';
    } else {
        pill.style.display = 'none';
    }
}

function loadSongs(){
    const list = document.getElementById('songs-list'); 
    const songs = getSongs();
    
    if(!songs.length){
        list.innerHTML='<div style="padding:40px;color:var(--secondary);text-align:center">No songs released</div>';
        return;
    }
    
    songs.sort((a,b)=>(b.streams||0)-(a.streams||0));
    
    let html = '';
    const chunkSize = 4; 
    for (let i = 0; i < songs.length; i += chunkSize) {
        const chunk = songs.slice(i, i + chunkSize);
        html += '<div class="song-page-list">'; 
        html += chunk.map((s, idx) => {
            const cover = s.coverArt || 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=200&h=200&fit-crop';
            const streams = Math.floor((s.streams || 0) / 2); 
            const titleDisplay = s.npcArtist ? `${s.songName} (feat. ${s.npcArtist})` : s.songName;
            return `
            <div class="top-song-item" onclick="playSong('${s.songName}')">
                <img src="${cover}" class="top-song-cover">
                <div class="top-song-info">
                    <div class="top-song-title">${titleDisplay}</div>
                    <div class="top-song-streams">${formatLargeNumber(streams)}</div>
                </div>
            </div>`;
        }).join('');
        html += '</div>'; 
    }
    list.innerHTML = html;
}

function loadAlbums(){
    const albums=getAlbums();
    const albumGrid=document.getElementById('albums-grid');
    albumGrid.innerHTML='';
    albums.forEach((album,i)=>{
        const div=document.createElement('div');
        div.className='album-card';
        div.onclick=()=>openAlbum(i);
        div.innerHTML=`<img class="album-cover" src="${album.coverArt||'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300&h=300&fit=crop'}">
        <div class="album-title">${album.name||album.albumName||'Untitled'}</div>
        <div class="album-year">${album.releaseYear||new Date().getFullYear()}</div>`;
        albumGrid.appendChild(div);
    });
    if(!albums.length){
        albumGrid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--secondary);padding:40px">No albums released</div>';
    }
}

// --- MODAL FUNCTIONS (Apple Music Style) ---
function openAlbum(index){
    const albums=getAlbums(),album=albums[index];
    if(!album)return;

    const songs=getSongs();
    const cover=album.coverArt||'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=400&fit=crop';
    const artistDetails=JSON.parse(localStorage.getItem('artistDetails')||'{}');
    const artistName=artistDetails.name||'Artist Name';
    const genre=artistDetails.genre||album.genre||'Pop';
    const year=album.releaseYear||new Date().getFullYear();

    const albumTracks=album.songs?album.songs.map(track=>{
        const releasedSong=songs.find(s=>(s.songName||s.name)===(track.songName||track.name||track));
        return{
            name:track.songName||track.name||track||'Untitled',
            npcArtist:track.npcArtist||(releasedSong?releasedSong.npcArtist:null)
        };
    }):[];

    const trackList=albumTracks.length>0?albumTracks.map((track,i)=>{
        const displayName=track.npcArtist?`${track.name} (feat. ${track.npcArtist})`:track.name;
        return`<div class="am-song-item" onclick="playSong('${track.name.replace(/'/g, "\\'")}')">
            <div class="am-song-num">${i+1}</div>
            <div class="am-song-name">${displayName}</div>
            <div class="am-chart-more" style="font-size: 16px; opacity: 0.5;">•••</div>
        </div>`;
    }).join(''):'<div style="padding:24px;color:#7a5a3a;text-align:center;font-size:14px">No tracks in this album</div>';

    const contentEl=document.getElementById('album-content');
    contentEl.innerHTML=`
    <div class="am-topbar">
        <button class="am-topbar-btn" onclick="closeAlbum()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
    </div>
    <div class="am-cover-section">
        <img src="${cover}" class="am-cover-img" alt="${album.name||'Album'}">
    </div>
    <div class="am-info">
        <div class="am-title">${album.name||album.albumName||'Untitled'}</div>
        <div class="am-artist">${artistName}</div>
        <div class="am-meta">
            <span>${genre}</span><span>·</span><span>${year}</span>
        </div>
    </div>
    <div class="am-controls">
        <button class="am-shuffle-btn" onclick="shuffleAlbum(${index})" title="Shuffle">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="am-play-btn" onclick="playAlbum(${index})" title="Play">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play
        </button>
        <button class="am-check-btn" title="Add to Library">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </button>
    </div>
    <div class="am-songs-section">${trackList}</div>`;

    document.getElementById('album-modal').classList.add('active');
    applyAlbumColors(cover);
}

function closeAlbum(){
    document.getElementById('album-modal').classList.remove('active');
}

// Colors for album modal
function applyAlbumColors(imgSrc) {
    const modal = document.getElementById('album-modal');
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
        try {
            const canvas = document.createElement('canvas');
            canvas.width = 80; canvas.height = 80;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 80, 80);
            const data = ctx.getImageData(0, 0, 80, 80).data;
            let r=0,g=0,b=0,count=0;
            for(let i=0;i<data.length;i+=12){ r+=data[i];g+=data[i+1];b+=data[i+2];count++; }
            r=Math.floor(r/count);g=Math.floor(g/count);b=Math.floor(b/count);
            
            modal.style.setProperty('--am-bg', `rgb(${Math.min(r+40,255)},${Math.min(g+40,255)},${Math.min(b+40,255)})`);
            modal.style.setProperty('--am-play-bg', `rgb(${Math.max(r-40,0)},${Math.max(g-40,0)},${Math.max(b-40,0)})`);
            modal.style.setProperty('--am-play-text', '#fff');
            modal.style.setProperty('--am-text-primary', '#111');
            modal.style.setProperty('--am-text-secondary', '#444');
            modal.style.setProperty('--am-text-meta', '#666');
        } catch(e) { }
    };
    img.src = imgSrc;
}

function setupImage(){

    img.onclick=()=>input.click();
    input.onchange=e=>{

        reader.onload=ev=>{
            img.src=ev.target.result;
            photoDB.save(ev.target.result);
            localStorage.removeItem('artistPhoto');
        };
        reader.readAsDataURL(file);
    }
};
}
