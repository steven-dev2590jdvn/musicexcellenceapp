
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musify Charts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        musify: {
                            base: '#000000',
                            card: '#121212',
                            hover: '#2a2a2a',
                            accent: '#1ed760',
                            text: '#ffffff',
                            muted: '#b3b3b3',
                            border: '#282828'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%);
        }

        .row-hover:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .details-row {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
            background-color: #181818;
        }

        .details-row.open {
            grid-template-rows: 1fr;
        }

        .details-inner {
            overflow: hidden;
        }

        .badge-new {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            padding: 2px 4px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-up {
            color: #10b981;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1px;
        }

        .badge-down {
            color: #ef4444;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1px;
        }

        .badge-same {
            color: #6b7280;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .table-grid {
            display: grid;
            grid-template-columns: 30px 1fr 40px 40px 40px 70px;
            gap: 12px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .table-grid {
                grid-template-columns: 24px 1fr 60px; /* Hide peak/prev/streak on mobile */
                gap: 8px;
            }
            .hide-mobile {
                display: none !important;
            }
            .hero-text {
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body class="antialiased pb-20">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-musify-border px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='musify.html'">
            <img src="mcc.png" alt="Musify" class="h-6 w-6 object-contain" onerror="this.src='https://placehold.co/24x24/1ed760/000?text=M'">
            <span class="text-lg font-black tracking-tight">MUSIFY CHARTS</span>
        </div>
        <button onclick="window.location.href='musify.html'" class="text-xs font-bold text-musify-muted hover:text-white transition-colors">
            Back
        </button>
    </nav>

    <!-- Hero Section -->
    <div class="hero-gradient px-4 py-6 relative overflow-hidden flex items-center min-h-[160px] md:min-h-[200px]">
        <div class="absolute inset-0 bg-black/20"></div>
        <div class="absolute bottom-0 left-0 w-full h-20 bg-gradient-to-t from-black to-transparent"></div>
        
        <div class="max-w-6xl mx-auto w-full relative z-10 flex items-center gap-6">
            <div class="w-24 h-24 md:w-36 md:h-36 flex-shrink-0 shadow-xl shadow-black/50 relative group">
                <img id="hero-image" src="https://placehold.co/300x300/121212/333?text=Art" alt="Top Song" class="w-full h-full object-cover rounded-md">
                <div class="absolute top-1.5 left-1.5 bg-black/80 text-white font-black px-2 py-0.5 rounded text-xs backdrop-blur-sm">#1</div>
            </div>
            
            <div class="flex-1">
                <div class="text-musify-muted font-bold text-[10px] tracking-widest uppercase mb-2 flex items-center gap-1.5">
                    <img src="mcc.png" class="w-3 h-3 object-contain opacity-80" alt="" onerror="this.style.display='none'">
                    All Global Charts
                </div>
                <h1 id="hero-headline" class="hero-text text-xl md:text-3xl font-black text-white leading-tight mb-2 shadow-sm">
                    Loading Top Charts...
                </h1>
                <p id="hero-date" class="text-musify-muted font-medium text-xs">
                    Top Songs Global • Updating
                </p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto px-3 md:px-6 mt-6">
        
        <!-- Header & Filters -->
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-3">
            <div>
                <h2 class="text-xl md:text-2xl font-black mb-1">Weekly Top Songs Global</h2>
                <p class="text-musify-muted text-xs font-medium">Your weekly update of the most played tracks right now on Musify.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <button class="bg-musify-card border border-musify-border hover:border-gray-500 text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 transition-all">
                    Weekly
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <button class="bg-musify-card border border-musify-border hover:border-gray-500 text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 transition-all" id="week-filter-btn">
                    Current Week
                </button>
                <button id="my-songs-btn" onclick="toggleMySongs()" class="bg-musify-card border border-musify-border hover:border-gray-500 text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 transition-all">
                    My Songs
                </button>
            </div>
        </div>

        <!-- Table Header -->
        <div class="table-grid px-3 py-1.5 border-b border-musify-border text-[10px] font-bold text-musify-muted tracking-wider uppercase mb-2">
            <div class="text-center">#</div>
            <div>Track</div>
            <div class="text-right hide-mobile">Peak</div>
            <div class="text-right hide-mobile">Prev</div>
            <div class="text-right hide-mobile">Streak</div>
            <div class="text-right">Streams</div>
        </div>

        <!-- Chart List -->
        <div id="chart-list" class="flex flex-col gap-0.5">
            <!-- Rows injected by JS -->
        </div>

    </div>

    <script>
        // --- Global State ---
        let globalProcessedData = [];
        let showOnlyMySongs = false;
        let gameDateObj = new Date();
        let currentUserName = "You";

        function formatNumber(num) {
            return parseInt(num).toLocaleString('en-US');
        }

        function getPastDate(baseDate, weeksAgo) {
            const d = new Date(baseDate);
            d.setDate(d.getDate() - (weeksAgo * 7));
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getMovementHtml(currentRank, prevRank) {
            if (!prevRank || prevRank === 0 || prevRank > 100) {
                return `<span class="badge-new">New</span>`;
            }
            if (currentRank < prevRank) {
                return `<span class="badge-up"><svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>${prevRank - currentRank}</span>`;
            } else if (currentRank > prevRank) {
                return `<span class="badge-down"><svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>${currentRank - prevRank}</span>`;
            } else {
                return `<span class="badge-same">-</span>`;
            }
        }

        function initCharts() {
            globalProcessedData = JSON.parse(localStorage.getItem('musify_chart_final') || '[]');

            const currentDateStr = localStorage.getItem('currentDate') || new Date().toISOString();
            gameDateObj = new Date(currentDateStr);
            const artistDetails = JSON.parse(localStorage.getItem('artistDetails') || '{}');
            currentUserName = artistDetails.name || 'You';

            document.getElementById('hero-date').innerText = `Top Songs Global • Week of ${gameDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            document.getElementById('week-filter-btn').innerText = `Week of ${gameDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

            if (globalProcessedData.length === 0) {
                document.getElementById('chart-list').innerHTML = `
                    <div class="py-12 text-center text-musify-muted">
                        <p class="text-sm font-bold">Charts are empty.</p>
                    </div>`;
                document.getElementById('hero-headline').innerText = "Waiting for music...";
                return;
            }

            const topSong = globalProcessedData[0];
            if (topSong) {
                const coverArt = topSong.art || topSong.coverArt || 'https://placehold.co/300x300/121212/333?text=Art';
                document.getElementById('hero-image').src = coverArt;
                
                let heroText = `"${topSong.title}" by ${topSong.displayArtist} holds the #1 spot on Musify Global.`;
                if (!topSong.musifyPrev || topSong.musifyPrev === 0 || topSong.musifyPrev > 100) {
                    heroText = `"${topSong.title}" by ${topSong.displayArtist} is the highest new entry at #1.`;
                } else if (topSong.musifyPrev > 1) {
                    heroText = `"${topSong.title}" by ${topSong.displayArtist} climbs to #1 on Top Songs Global.`;
                }
                document.getElementById('hero-headline').innerText = heroText;
            }

            renderChartList();
        }

        // --- Render List Function ---
        function renderChartList() {
            const listContainer = document.getElementById('chart-list');
            listContainer.innerHTML = '';
            currentlyOpen = null;

            let dataToRender = globalProcessedData;
            if (showOnlyMySongs) {
                dataToRender = globalProcessedData.filter(song => song.isUserTrack);
            }

            if (dataToRender.length === 0 && showOnlyMySongs) {
                listContainer.innerHTML = `
                    <div class="py-12 text-center text-musify-muted">
                        <p class="text-sm font-bold">You don't have any songs in the Top 100 yet.</p>
                        <p class="text-xs mt-1">Keep releasing to build your streams!</p>
                    </div>`;
                return;
            }

            dataToRender.forEach((song, idx) => {
                const currentRank = song.originalRank;
                const prevRank = song.musifyPrev || 0;
                const movementHtml = getMovementHtml(currentRank, prevRank);
                const coverArt = song.art || song.coverArt || 'https://placehold.co/100x100/121212/333?text=Art';
                
                const firstEntryDate = getPastDate(gameDateObj, (song.musifyWeeks || 1) - 1);
                const releaseDateStr = song.releaseDate ? new Date(song.releaseDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : firstEntryDate;
                const producers = song.isUserTrack ? 'Self-Produced' : `${song.displayArtist}, Producer`;
                const writers = song.isUserTrack ? currentUserName : `${song.displayArtist}, Songwriter`;
                const source = song.isUserTrack ? 'Independent' : 'Major Records';

                const highlightClasses = song.isUserTrack 
                    ? 'bg-white/5 border-l-2 border-musify-accent hover:bg-white/10' 
                    : 'border-l-2 border-transparent row-hover';
                
                const userBadge = song.isUserTrack
                    ? `<span class="bg-musify-accent/20 text-musify-accent text-[9px] font-black px-1.5 py-0.5 rounded ml-1.5 uppercase tracking-wider">You</span>`
                    : '';

                const rowHtml = `
                    <div class="group">
                        <!-- Main Row -->
                        <div class="table-grid px-3 py-2 rounded-md cursor-pointer transition-all ${highlightClasses}" onclick="toggleDetails('${song.id || idx}')">
                            
                            <!-- Rank & Movement -->
                            <div class="flex flex-col items-center justify-center gap-0.5 w-6">
                                <span class="font-black text-sm ${currentRank <= 3 ? 'text-white' : 'text-musify-muted group-hover:text-white'}">${currentRank}</span>
                                ${movementHtml}
                            </div>
                            
                            <!-- Track Info -->
                            <div class="flex items-center gap-3 overflow-hidden">
                                <img src="${coverArt}" alt="Cover" class="w-9 h-9 rounded object-cover shadow-sm flex-shrink-0" onerror="this.src='https://placehold.co/100x100/121212/333?text=Art'">
                                <div class="flex flex-col truncate">
                                    <span class="font-bold text-white truncate text-sm">${song.title}</span>
                                    <div class="flex items-center">
                                        <span class="text-xs text-musify-muted truncate group-hover:text-white transition-colors">${song.displayArtist}</span>
                                        ${userBadge}
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Stats (Hidden on Mobile) -->
                            <div class="text-right text-xs text-musify-muted font-medium hide-mobile">${song.musifyPeak}</div>
                            <div class="text-right text-xs text-musify-muted font-medium hide-mobile">${prevRank || '-'}</div>
                            <div class="text-right text-xs text-musify-muted font-medium hide-mobile">${song.musifyWeeks}</div>
                            
                            <!-- Streams -->
                            <div class="text-right text-xs font-bold text-white tabular-nums">${formatNumber(song.musifyStreams)}</div>
                        </div>

                        <!-- Expandable Details -->
                        <div id="details-${song.id || idx}" class="details-row mx-3 rounded-b-md border-t border-transparent">
                            <div class="details-inner px-8 py-0 text-xs text-musify-muted">
                                <div class="py-4 flex flex-col md:flex-row gap-4 justify-between">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3 flex-1">
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Release Date</span>
                                            <span>${releaseDateStr}</span>
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Weeks on chart</span>
                                            <span>${song.musifyWeeks}</span>
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">First entry date</span>
                                            <span>${firstEntryDate}</span>
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Producers</span>
                                            <span>${producers}</span>
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Musify Peak</span>
                                            <span>${song.musifyPeak}</span> 
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Songwriters</span>
                                            <span class="underline decoration-musify-muted/50 cursor-pointer hover:text-white">${writers}</span>
                                        </div>
                                        <div class="grid grid-cols-[120px_1fr] gap-2">
                                            <span class="font-bold text-white">Source</span>
                                            <span>${source}</span>
                                        </div>
                                    </div>
                                    <div class="flex-shrink-0 flex items-end mt-2 md:mt-0">
                                        <button onclick="sharePromo('${song.title}')" class="bg-[#8b5cf6] hover:bg-[#7c3aed] text-white font-bold py-1.5 px-4 text-xs rounded-full transition-transform active:scale-95 shadow-lg shadow-purple-900/20">
                                            Design By Jayson Miller
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', rowHtml);
            });
        }

        window.toggleMySongs = function() {
            showOnlyMySongs = !showOnlyMySongs;
            const btn = document.getElementById('my-songs-btn');
            
            if (showOnlyMySongs) {
                btn.classList.add('bg-white', 'text-black');
                btn.classList.remove('bg-musify-card', 'text-white', 'hover:border-gray-500');
            } else {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('bg-musify-card', 'text-white', 'hover:border-gray-500');
            }
            
            renderChartList(); 
        }

        let currentlyOpen = null;
        window.toggleDetails = function(id) {
            const el = document.getElementById(`details-${id}`);
            
            if (currentlyOpen !== null && currentlyOpen !== id) {
                const oldEl = document.getElementById(`details-${currentlyOpen}`);
                if (oldEl) {
                    oldEl.classList.remove('open');
                    oldEl.style.borderTopColor = 'transparent';
                }
            }

            if (el.classList.contains('open')) {
                el.classList.remove('open');
                el.style.borderTopColor = 'transparent';
                currentlyOpen = null;
            } else {
                el.classList.add('open');
                el.style.borderTopColor = '#282828';
                currentlyOpen = id;
            }
        }

        window.sharePromo = function(songTitle) {
            alert(`Generated Promo Card for "${songTitle}"!`);
        }

        document.addEventListener('DOMContentLoaded', initCharts);

    </script>
</body>
</html>
