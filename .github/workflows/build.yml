name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Remove old iOS platform
        run: cordova platform remove ios || true

      - name: Add iOS platform
        run: cordova platform add ios

      - name: Prepare project
        run: cordova prepare ios

      - name: Show generated project
        run: |
          echo "===== iOS Project ====="
          find platforms/ios -maxdepth 3

      - name: Detect workspace and scheme
        run: |
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" | head -n1)

          echo "Workspace:"
          echo "$WORKSPACE"

          echo ""
          echo "Schemes:"
          xcodebuild -list -workspace "$WORKSPACE"

          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | \
          python3 -c "import sys,json;print(json.load(sys.stdin)['workspace']['schemes'][0])")

          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      - name: Build Device App
        run: |
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" | head -n1)

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Search for built app
        run: |
          echo "===== Cordova Build ====="
          find platforms/ios -name "*.app"

          echo ""
          echo "===== DerivedData ====="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app"

      - name: Create IPA
        run: |
          APP=$(find platforms/ios -name "*.app" | grep iphoneos | head -n1)

          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | grep Release | head -n1)
          fi

          if [ -z "$APP" ]; then
            echo "ERROR: No .app found!"
            exit 1
          fi

          echo "Using app:"
          echo "$APP"

          mkdir Payload
          cp -R "$APP" Payload/

          cd Payload
          zip -qry ../MusicExcellence.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicExcellence-IPA
          path: MusicExcellence.ipa
