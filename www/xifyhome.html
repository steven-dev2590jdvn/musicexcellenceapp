
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        x: { black: '#000000', dark: '#16181c', border: '#2f3336', blue: '#1d9bf0', blueHover: '#1a8cd8', text: '#e7e9ea', muted: '#71767b' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #e7e9ea; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Loading Spinner */
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #1d9bf0; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Smooth tab transitions */
        .tab-content { display: none; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Action Icons Hover */
        .action-btn { transition: color 0.2s; }
        .action-btn:hover.reply { color: #1d9bf0; }
        .action-btn:hover.repost { color: #00ba7c; }
        .action-btn:hover.like { color: #f91880; }
        .action-btn.liked { color: #f91880; }
        .action-btn.liked svg { fill: #f91880; stroke: #f91880; }
        
        /* Floating Compose Button */
        .fab { box-shadow: rgba(255, 255, 255, 0.2) 0px 0px 15px, rgba(255, 255, 255, 0.15) 0px 0px 3px 1px; }
    </style>
</head>
<body class="bg-x-black min-h-screen flex flex-col hide-scrollbar">

                </button>

            </div>
            
            <!-- X Logo -->

    <script>
        // --- 1. CORE DATA AND INITIALIZATION ---
        
        let currentUser = {
            name: "Artist",
            handle: "@artist",
            followers: 0,
            likes: 0,
            photo: null
        };
        let xifyPosts = [];
        let xifyDrafts = [];
        let currentImageUpload = null;
        let currentQuotePost = null;
        let currentBeefTarget = null;
        let currentPromoteSong = null;
        let weeklyBoostUsed = false;

        const PERSONALITIES = ['petty', 'unbothered', 'pr_machine', 'messy'];

        function getArtistPersonalities() {
            let p = JSON.parse(localStorage.getItem('xifyArtistPersonalities') || '{}');
            return p;
        }

        function assignPersonalities(artists) {
            let p = getArtistPersonalities();
            let changed = false;
            artists.forEach(a => {
                const key = a.toLowerCase().replace(/[^a-z0-9]/g, '');
                if (!p[key]) {
                    p[key] = PERSONALITIES[Math.floor(Math.random() * PERSONALITIES.length)];
                    changed = true;
                }
            });
            if (changed) localStorage.setItem('xifyArtistPersonalities', JSON.stringify(p));
            return p;
        }

        function getPersonality(artistName) {
            const p = getArtistPersonalities();
            const key = artistName.toLowerCase().replace(/[^a-z0-9]/g, '');
            return p[key] || 'unbothered';
        }

        // Stan account names per artist (2 per artist, based on artist name)
        function getStanAccounts(artistName) {
            const clean = artistName.toLowerCase().replace(/[^a-z0-9]/g, '');
            const suffixes = [
                ['girlie', 'forever'], ['army', 'nation'], ['stan', 'lover'],
                ['world', 'daily'], ['hive', 'era'], ['gang', 'updates'],
                ['mania', 'forever'], ['squad', 'stans']
            ];
            const idx = (clean.charCodeAt(0) || 0) % suffixes.length;
            return [
                { name: clean + suffixes[idx][0], handle: '@' + clean + suffixes[idx][0] },
                { name: clean + suffixes[idx][1], handle: '@' + clean + suffixes[idx][1] }
            ];
        }

        // Chaotic neutral accounts
        const CHAOTIC_ACCOUNTS = [
            { name: 'xify drama', handle: '@xifydrama' },

        function loadPosts() {
            try { xifyPosts = JSON.parse(localStorage.getItem('xifyPosts') || '[]'); } 
            catch (e) { xifyPosts = []; }

            // One-time cleanup: strip any large base64 image posts that got stuck in
            // localStorage before the IndexedDB fix. Their real copies already live
            // in MusicGameDB.xifyPosts and get merged back in via mergeMagazineCovers().
            const beforeLen = xifyPosts.length;
            xifyPosts = xifyPosts.filter(p => !(p.mediaType === 'image' && typeof p.mediaData === 'string' && p.mediaData.length > 20000));
            if (xifyPosts.length !== beforeLen) {
                localStorage.setItem('xifyPosts', JSON.stringify(xifyPosts));
            }

            // Migrate old real timestamps to week-based system
            const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
            let migrated = false;
            xifyPosts.forEach(post => {
                if (post.ts > 9999999) {
                    // Real Unix timestamp — convert to week 1
                    post.ts = 10000 + Math.floor(Math.random() * 4999);
                    migrated = true;
                } else if (post.ts > currentWeek * 10000) {
                    // ts was artificially bumped past the current week — clamp it back
                    post.ts = Math.max(10000, currentWeek * 10000 - Math.floor(Math.random() * 500));
                    migrated = true;
                }
            });
            if (migrated) {
                localStorage.setItem('xifyPosts', JSON.stringify(xifyPosts));
            }
        }

        async function mergeMagazineCovers() {
            const covers = await magazineCoversDB.loadAll();
            if (!covers.length) return;
            const existingIds = new Set(xifyPosts.map(p => p.id));
            const newCovers = covers.filter(c => !existingIds.has(c.id));
            if (newCovers.length) {
                // Stamp each incoming cover with a real week-based ts at merge time,
                // instead of trusting whatever ts (or lack of one) magazine.html wrote.
                // Without this, magazine posts freeze at "week 1 recent" forever and
                // never age like every other post in the feed.
                const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
                newCovers.forEach(c => {
                    if (!c.ts || c.ts > currentWeek * 10000 || c.ts > 9999999) {
                        c.ts = currentWeek * 10000 - Math.floor(Math.random() * 500);
                    }
                });
                xifyPosts = [...newCovers, ...xifyPosts];
                localStorage.setItem('xifyPosts', JSON.stringify(xifyPosts));
            }
        }

Hard rules:

        // ── CALENDAR EVENTS ──
        function checkCalendarEvents() {
            const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
            // Week 1-4 = Feb (BHM), Week 22-26 ≈ June (Pride) in a 52-week year
            // Using game week cycling: BHM = weeks where (week % 52) is 1-4
            // Pride = weeks where (week % 52) is 22-25
            const weekInYear = ((currentWeek - 1) % 52) + 1;

            const isBHM = weekInYear >= 1 && weekInYear <= 4;
            const isPride = weekInYear >= 22 && weekInYear <= 25;

            if (!isBHM && !isPride) return;

            const chartSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
            const eventName = isBHM ? 'Black History Month' : 'Pride Month';
            const eventTag = isBHM ? '#BlackHistoryMonth' : '#PrideMonth';
            const eventKey = isBHM ? 'bhm' : 'pride';
            const posted = JSON.parse(localStorage.getItem('xifyCalendarPosted') || '{}');

            let newPosts = [];

            // Check each artist — did they post this event week?
            chartSongs.filter(s => !s.isUser).forEach(song => {
                const artist = song.artist;
                const artistKey = artist.toLowerCase().replace(/[^a-z0-9]/g, '');
                const postedKey = `${artistKey}_${eventKey}_${weekInYear}`;

                if (posted[postedKey]) return;

                const willPost = Math.random() > 0.35; // 65% chance they post
                posted[postedKey] = willPost ? 'posted' : 'silent';
                localStorage.setItem('xifyCalendarPosted', JSON.stringify(posted));

                if (willPost) {
                    const handle = '@' + artistKey;
                    const avatar = song.art || getChaoticAvatar(handle);
                    const personality = getPersonality(artist);

                    let content = '';
                    if (personality === 'pr_machine') {
                        content = isBHM
                            ? `This ${eventName}, we honor the legacy of Black artists who built the foundation of music as we know it. We stand with this community always. ${eventTag}`
                            : `Proud to celebrate ${eventName} with our community. Love is love, always. 🏳️‍🌈 ${eventTag}`;
                    } else if (personality === 'petty') {
                        content = isBHM
                            ? `happy ${eventName} to all my people 🖤✊ y'all know i stay repping`
                            : `${eventName} 🏳️‍🌈 love wins and the haters can cry about it`;
                    } else {
                        content = isBHM
                            ? `${eventName} 🖤 honoring the culture that made me who i am. ${eventTag}`
                            : `celebrating ${eventName} with love 🏳️‍🌈 ${eventTag}`;
                    }

                    newPosts.push(createNPCPayload(artist, handle, avatar, content, 'none', null));
                } else {
                    // They stayed silent — stans drag them
                    const stans = getStanAccounts(artist);
                    const rival = chartSongs.find(s => s.artist !== artist && !s.isUser && posted[s.artist.toLowerCase().replace(/[^a-z0-9]/g,'') + `_${eventKey}_${weekInYear}`] === 'posted');

                    if (rival) {
                        const dragAcct = CHAOTIC_ACCOUNTS[Math.floor(Math.random() * CHAOTIC_ACCOUNTS.length)];
                        const dragContent = isBHM
                            ? `we are in WEEK ${weekInYear} of ${eventName} and ${artist} has not said ONE thing. the silence is loud. 👀`
                            : `it is ${eventName} and ${artist} has posted NOTHING. while ${rival.artist} showed up. make it make sense.`;

                        newPosts.push(createNPCPayload(dragAcct.name, dragAcct.handle, getChaoticAvatar(dragAcct.handle), dragContent, 'none', null));

                        // Apply soft cancel penalty
                        applyCancelPenalty(artist, 'soft', `Silent during ${eventName}`);
                    }
                }
            });

            // Check player too
            const playerPostedKey = `player_${eventKey}_${weekInYear}`;
            if (!posted[playerPostedKey]) {
                const playerPosts = JSON.parse(localStorage.getItem('xifyPosts') || '[]');
                const playerPostThisWeek = playerPosts.filter(p => !p.npc && Math.floor((p.ts || 0) / 10000) === currentWeek);
                if (playerPostThisWeek.length === 0 && weekInYear > 1) {
                    posted[playerPostedKey] = 'silent';
                    localStorage.setItem('xifyCalendarPosted', JSON.stringify(posted));

                    // Stans notice
                    const dragAcct = CHAOTIC_ACCOUNTS[Math.floor(Math.random() * CHAOTIC_ACCOUNTS.length)];
                    const content = isBHM
                        ? `so ${currentUser.name} really has nothing to say for ${eventName}? the silence is telling. 👀`
                        : `it's ${eventName} and ${currentUser.name} is radio silent. okay then. 🏳️‍🌈`;
                    newPosts.push(createNPCPayload(dragAcct.name, dragAcct.handle, getChaoticAvatar(dragAcct.handle), content, 'none', null));
                    applyCancelPenalty(currentUser.name, 'soft', `Silent during ${eventName}`, true);
                } else {
                    posted[playerPostedKey] = 'posted';
                    localStorage.setItem('xifyCalendarPosted', JSON.stringify(posted));
                }
            }

            xifyPosts = [...newPosts, ...xifyPosts];
        }

        // ── CANCEL PENALTY SYSTEM ──
        function applyCancelPenalty(artistName, severity, reason, isPlayer = false) {
            const penalties = JSON.parse(localStorage.getItem('xifyCancelPenalties') || '{}');
            const key = artistName.toLowerCase().replace(/[^a-z0-9]/g, '');
            const multipliers = { soft: 0.85, mid: 0.60, full: 0.35 };
            const durations = { soft: 3, mid: 6, full: 12 };

            penalties[key] = {
                severity,
                reason,
                multiplier: multipliers[severity],
                weeksLeft: durations[severity],
                isPlayer,
                startWeek: parseInt(localStorage.getItem('currentWeek') || '1')
            };

            localStorage.setItem('xifyCancelPenalties', JSON.stringify(penalties));

            if (isPlayer) {
                // Immediately hit player streams
                applyPlayerStreamPenalty(multipliers[severity]);
            }
        }

        function applyPlayerStreamPenalty(multiplier) {
            try {
                const songs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
                songs.forEach(s => {
                    s.weeklyStreams = Math.floor((s.weeklyStreams || 0) * multiplier);
                });
                localStorage.setItem('releasedSongs', JSON.stringify(songs));

                // Also hit popularity and respect
                const pop = parseFloat(localStorage.getItem('popularity') || '50');
                const resp = parseFloat(localStorage.getItem('respect') || '50');
                localStorage.setItem('popularity', String(Math.max(1, pop * multiplier)));
                localStorage.setItem('respect', String(Math.max(1, resp * multiplier)));
            } catch(e) { console.warn('Cancel penalty apply failed', e); }
        }

        function checkCancelPenaltyDecay() {
            const penalties = JSON.parse(localStorage.getItem('xifyCancelPenalties') || '{}');
            let changed = false;

            Object.keys(penalties).forEach(key => {
                const p = penalties[key];
                p.weeksLeft--;

                if (p.weeksLeft <= 0) {
                    delete penalties[key];
                    if (p.isPlayer) {
                        // Show recovery post
                        const dragAcct = CHAOTIC_ACCOUNTS[0];
                        xifyPosts.unshift(createNPCPayload(
                            dragAcct.name, dragAcct.handle,
                            getChaoticAvatar(dragAcct.handle),
                            `looks like the ${currentUser.name} drama has finally died down. streams recovering 📈`,
                            'none', null
                        ));
                    }
                } else {
                    // Keep applying penalty each week
                    if (p.isPlayer) {
                        const weekMultiplier = p.severity === 'soft' ? 0.93 : p.severity === 'mid' ? 0.85 : 0.75;
                        applyPlayerStreamPenalty(weekMultiplier);
                    }
                }
                changed = true;
            });

            if (changed) localStorage.setItem('xifyCancelPenalties', JSON.stringify(penalties));
        }

        // ── STAN LOYALTY TURN ──
        function checkStanLoyaltyTurn() {
            const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
            const releasedSongs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
            if (releasedSongs.length === 0) return;

            const lastRelease = releasedSongs.reduce((latest, s) => {

            if (weeksSinceRelease < 32) return;

            // Stans turn every 4 weeks after the 32 week mark
            const lastTurn = parseInt(localStorage.getItem('xifyLastStanTurn') || '0');
            if (currentWeek - lastTurn < 4) return;

        function createNPCPayload(authorName, handle, avatar, content, mediaType, mediaData, linkData) {
            const baseMultiplier = handle === '@chartdata' ? 1 : 2;
            const likes = Math.floor((1000 + Math.random() * 50000) * baseMultiplier);
            const reposts = Math.floor(likes * (0.1 + Math.random() * 0.2));
            const comments = Math.floor(likes * (0.05 + Math.random() * 0.1));
            const views = likes * (10 + Math.floor(Math.random() * 20));

            return {
                id: 'post_' + Date.now() + Math.random().toString(36).substr(2, 5),
                authorName: authorName,
                authorHandle: handle,
                avatar: avatar,
                isVerified: true,
                content: content,
                mediaType: mediaType || 'none',
                mediaData: mediaData || null,
                linkData: linkData || null,
                likes: likes,
                reposts: reposts,
                comments: comments,
                views: views,
                isLiked: false,
                isReposted: false,
                ts: parseInt(localStorage.getItem('currentWeek') || '1') * 10000 - Math.floor(Math.random() * 500),
                npc: true
            };
        }

        function generateChartDataPosts() {
            const chartSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
            const chartAlbums = JSON.parse(localStorage.getItem('chart_albums_final') || '[]');
            if (chartSongs.length === 0) return;

            let newPosts = [];

            function moveTag(s) {
                if (!s.lastPos || s.lastPos === 0) return '(NEW)';
                const diff = s.lastPos - s.rank;
                if (diff > 0) return `(+${diff})`;
                if (diff < 0) return `(${diff})`;
                return '(=)';
            }

            // 1. #1 Song with cover art
            const numberOne = chartSongs[0];
            if (numberOne) {
                const tag = moveTag(numberOne);
                const content = `Excellence Hot 100 | This week's #1:\n\n#1 ${tag} ${numberOne.title} - ${numberOne.artist}\n${numberOne.weeks} week${numberOne.weeks !== 1 ? 's' : ''} on chart | Peak: #${numberOne.peak}`;
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', numberOne.art || null));
            }

            // 2. Biggest climb (most positions gained, min +5, not #1 already)
            const climbers = chartSongs
                .filter(s => s.lastPos > 0 && (s.lastPos - s.rank) >= 5 && s.rank !== 1)
                .sort((a, b) => (b.lastPos - b.rank) - (a.lastPos - a.rank));
            if (climbers.length > 0) {
                const c = climbers[0];
                const gained = c.lastPos - c.rank;
                const content = `Excellence Hot 100 | Biggest Climber:\n\n#${c.rank} (+${gained}) ${c.title} - ${c.artist}\nUp from #${c.lastPos} | ${c.weeks} week${c.weeks !== 1 ? 's' : ''} on chart`;
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', c.art || null));
            }

            // 3. Biggest drop (most positions lost, min 5 drop)
            const fallers = chartSongs
                .filter(s => s.lastPos > 0 && (s.rank - s.lastPos) >= 5)
                .sort((a, b) => (b.rank - b.lastPos) - (a.rank - a.lastPos));
            if (fallers.length > 0) {
                const f = fallers[0];
                const lost = f.rank - f.lastPos;
                const content = `Excellence Hot 100 | Biggest Drop:\n\n#${f.rank} (-${lost}) ${f.title} - ${f.artist}\nDown from #${f.lastPos} | Peak: #${f.peak}`;
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', f.art || null));
            }

            // 4. New entries this week (up to 3)
            const newEntries = chartSongs.filter(s => !s.lastPos || s.lastPos === 0).slice(0, 3);
            if (newEntries.length > 0) {
                const lines = newEntries.map(s => `#${s.rank} (NEW) ${s.title} - ${s.artist}`).join('\n');
                const content = `Excellence Hot 100 | New Entries This Week:\n\n${lines}`;
                // Use cover art of the highest new entry
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', newEntries[0].art || null));
            }

            // 5. User's song if on chart
            const userSongs = chartSongs.filter(s => s.isUser);
            if (userSongs.length > 0) {
                const u = userSongs[0];
                const tag = moveTag(u);
                const content = `Excellence Hot 100 | Spotlight:\n\n#${u.rank} ${tag} ${u.title} - ${u.artist}\n${u.weeks} week${u.weeks !== 1 ? 's' : ''} on chart | Peak: #${u.peak}`;
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', u.art || u.coverArt || null));
            }

            // 6. #1 Album with cover art and sales
            if (chartAlbums.length > 0) {
                const alb = chartAlbums[0];
                const albTag = (!alb.lastPos || alb.lastPos === 0) ? '(NEW)' : alb.lastPos === 1 ? '(=)' : `(+${alb.lastPos - 1})`;
                const salesStr = alb.units ? `${alb.units.toLocaleString()} units` : null;
                const content = `Excellence 200 | This week\'s #1 Album:\n\n#1 ${albTag} ${alb.title} - ${alb.artist}\n${alb.weeks || 1} week${(alb.weeks || 1) !== 1 ? 's' : ''} on chart${salesStr ? ` | ${salesStr} this week` : ''}`;
                newPosts.push(createNPCPayload('chart data', '@chartdata', AVATAR_CHARTDATA, content, 'image', alb.art || null));
            }

            xifyPosts = [...newPosts, ...xifyPosts];
        }

            const allDots = [];
            zones.forEach(z => {
                for (let row=0; row<z.rows; row++) {
                    const radius = z.r0 + row * z.dr;
                    const arcDeg = z.a1 - z.a0;
                    const arcLen = Math.PI * arcDeg / 180 * radius;
                    const n = Math.max(4, Math.floor(arcLen / (dotR*2 + gap)));
                    for (let d=0; d<n; d++) {
                        const deg = z.a0 + (arcDeg / n) * d;
                        const rad = deg * Math.PI / 180;
                        const x = cx + Math.cos(rad) * radius;
                        const y = cy + Math.sin(rad) * radius;
                        allDots.push({ x, y, color: z.color });
                    }
                }
            });
            const soldCount = Math.floor(allDots.length * Math.min(1, fillRate));
            allDots.forEach((dot, i) => {
                const isSold = i < soldCount;
                const c = isSold ? '#3f3f46' : dot.color;
                const op = isSold ? '0.4' : '0.85';
                s += `<circle cx="${dot.x.toFixed(1)}" cy="${dot.y.toFixed(1)}" r="${dotR}" fill="${c}" opacity="${op}"/>`;
            });
            s += `<text x="230" y="30" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.8">${Math.round(Math.min(1, fillRate) * 100)}% SOLD</text>`;
            s += '</svg>';
            return s;
        }

        function generateExcellenceNationPosts() {
            const tours = JSON.parse(localStorage.getItem('tycoon_tours') || '[]');
            if (tours.length === 0) return;
            let newPosts = [];

            tours.forEach(tour => {
                if (tour.status === 'completed') return;
                const totalCap = tour.totalCapacity || 0;
                const sold = tour.ticketsSold || 0;
                const fillPct = totalCap > 0 ? Math.round((sold / totalCap) * 100) : 0;
                const fillRate = totalCap > 0 ? sold / totalCap : 0;
                const avgPrice = tour.prices
                    ? Math.round((tour.prices.discount * 0.2) + (tour.prices.general * 0.6) + (tour.prices.vip * 0.2))
                    : (tour.price || '—');
                const seatSvg = buildXifySeatMap(fillRate);

                if (tour.status === 'selling') {
                    const isAnnouncement = tour.weeksUntilStart === 4;
                    if (isAnnouncement) {
                        const content = `🎤 ${currentUser.name} announces the ${tour.name}!\n\n📍 ${tour.route.length} cities worldwide\n🎟 ${totalCap.toLocaleString()} total tickets\n💵 From $${tour.prices ? tour.prices.discount : avgPrice}\n\nPresale is LIVE now!`;
                        newPosts.push(createNPCPayload('Excellence Nation', '@ExcellenceNation', AVATAR_NATION, content, 'svg-map', seatSvg));
                    } else {
                        const content = `📊 ${tour.name} — Presale Update\n\n🎟 ${sold.toLocaleString()} / ${totalCap.toLocaleString()} sold (${fillPct}%)\n💵 Avg ticket: $${avgPrice}\n⏳ ${tour.weeksUntilStart} week${tour.weeksUntilStart !== 1 ? 's' : ''} until show begins`;
                        newPosts.push(createNPCPayload('Excellence Nation', '@ExcellenceNation', AVATAR_NATION, content, 'svg-map', seatSvg));
                    }
                } else if (tour.status === 'live') {
                    const venue = tour.route[tour.currentStop] || tour.route[tour.route.length - 1];
                    const showNum = (tour.currentStop || 0) + 1;
                    const content = `🎤 ON TOUR: ${currentUser.name} — ${tour.name}\n\nShow ${showNum} of ${tour.route.length}: ${venue ? venue.name + ', ' + venue.location : 'Worldwide'}\n🎟 ${sold.toLocaleString()} tickets sold (${fillPct}% capacity)\n💵 Avg ticket: $${avgPrice}`;
                    newPosts.push(createNPCPayload('Excellence Nation', '@ExcellenceNation', AVATAR_NATION, content, 'svg-map', seatSvg));
                }
            });

            xifyPosts = [...newPosts, ...xifyPosts];
        }

        function formatNum(num) {
            if (!num) return 0;
            if (num >= 1000000) return (num/1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (num >= 1000) return (num/1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return num;
        }

        function getTimeString(ts) {
            const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
            const postWeek = Math.floor(ts / 10000);
            const weekDiff = currentWeek - postWeek;
            if (weekDiff <= 0) return 'This week';
            if (weekDiff === 1) return '1w ago';
            if (weekDiff > 52) return 'Long ago';
            return weekDiff + 'w ago';
        }

        function renderTrending() {
            const container = document.getElementById('trending-container');
            container.innerHTML = '';
            const chartSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
            const currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');

            let scores = {};

            // 1. Score topics from actual post content — hashtags AND artist names AND song titles
            xifyPosts.forEach(p => {
                const weight = p.likes + p.reposts * 2 + (p.views || 0) * 0.01;
                // Hashtags
                (p.content.match(/#\w+/g) || []).forEach(m => {
                    scores[m] = (scores[m] || 0) + weight;
                });
                // Chart artist names mentioned in posts
                chartSongs.forEach(s => {
                    if (s.artist && p.content.toLowerCase().includes(s.artist.toLowerCase())) {
                        const key = s.artist;
                        scores[key] = (scores[key] || 0) + weight * 0.8;
                    }
                });
                // Song titles mentioned
                chartSongs.forEach(s => {
                    if (s.title && p.content.toLowerCase().includes(s.title.toLowerCase())) {
                        const key = `"${s.title}"`;
                        scores[key] = (scores[key] || 0) + weight * 0.6;
                    }
                });
            });

            // 2. Boost active beef topics
            const beefs = JSON.parse(localStorage.getItem('xifyActiveBeefs') || '{}');
            Object.keys(beefs).forEach(artist => {
                const tag = currentUser.name.replace(/\s/g,'') + 'vs' + artist.replace(/\s/g,'');
                scores['#' + tag] = (scores['#' + tag] || 0) + 800000;
                scores[artist] = (scores[artist] || 0) + 300000;
            });

            // 3. Boost top 3 chart artists organically
            chartSongs.slice(0, 3).forEach((s, i) => {
                scores[s.artist] = (scores[s.artist] || 0) + (80000 - i * 20000);
                if (s.title) scores[`"${s.title}"`] = (scores[`"${s.title}"`] || 0) + (40000 - i * 10000);
            });

            // 4. Seasonal/evergreen topics that feel real
            const weekMod = currentWeek % 12;
            const evergreenPool = [
                '#NewMusicFriday', '#ExcellenceAwards', '#StreamingWars',
                '#MusicTwitter', '#HotTakes', '#IndustryTea',
                '#AlbumOfTheYear', '#ChartsUpdate', '#StanWars', '#CancelledOrNot'
            ];
            // Pick 3 that change each week
            [0,3,7].forEach(offset => {
                const topic = evergreenPool[(weekMod + offset) % evergreenPool.length];
                scores[topic] = (scores[topic] || 0) + (15000 + Math.floor(Math.random() * 30000));
            });

            // 5. Remove the player name from trending unless it's massive (they're the player, it's weird)
            const playerNameKey = currentUser.name;
            if (scores[playerNameKey] && scores[playerNameKey] < 500000) delete scores[playerNameKey];

            // 6. Deduplicate: if artist name AND their song both appear, keep whichever scores higher
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const seen = new Set();
            const trends = [];
            for (const [topic, score] of sorted) {
                // Skip boring single-char or numeric-only entries
                if (topic.replace(/[^a-zA-Z]/g,'').length < 2) continue;
                const norm = topic.toLowerCase().replace(/[^a-z]/g,'');
                if (seen.has(norm)) continue;
                seen.add(norm);
                trends.push([topic, score]);
                if (trends.length >= 5) break;
            }

            const categories = ['Music', 'Entertainment', 'Trending', 'Charts', 'Culture'];
            trends.forEach(([topic, score], index) => {
                const postCount = Math.floor(50000 + score * 0.001 + Math.random() * 20000);
                const category = categories[index % categories.length];
                const html = `
                <div class="px-4 py-3 hover:bg-white/[0.03] transition-colors cursor-pointer flex justify-between items-start">
                    <div>
                        <div class="text-[13px] text-x-muted">${category} · Trending</div>
                        <div class="font-bold text-[15px] text-white mt-0.5">${escapeHTML(topic)}</div>
                        <div class="text-[13px] text-x-muted mt-0.5">${formatNum(postCount)} posts</div>
                    </div>
                    <button class="text-x-muted hover:text-x-blue hover:bg-x-blue/10 p-2 rounded-full -mr-2 transition-colors">
                        <svg viewBox="0 0 24 24" class="w-[18.75px] h-[18.75px] fill-current"><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></svg>
                    </button>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- 4. INTERACTIONS ---

        function toggleLike(id) {
            const post = xifyPosts.find(p => p.id === id);
            if (!post) return;
            if (post.isLiked) { post.likes--; post.isLiked = false; }
            else { post.likes++; post.isLiked = true; }
            
            let totalLikes = parseInt(localStorage.getItem('xifyTotalLikes') || '0');
            localStorage.setItem('xifyTotalLikes', String(totalLikes + (post.isLiked ? 1 : -1)));

            savePosts();
            renderFeed();
        }

        function toggleRepost(id) {
            const post = xifyPosts.find(p => p.id === id);
            if (!post) return;
            if (post.isReposted) { post.reposts--; post.isReposted = false; }
            else { post.reposts++; post.isReposted = true; }
            savePosts();
            renderFeed();
        }

        function toggleRepostMenu(postId, btn) {
            closeAllRepostMenus();
            const menu = document.getElementById('repost-menu-' + postId);
            if (menu) menu.classList.toggle('hidden');
            setTimeout(() => document.addEventListener('click', function handler() {
                closeRepostMenu(postId);
                document.removeEventListener('click', handler);
            }), 50);
        }

        function closeRepostMenu(postId) {
            const menu = document.getElementById('repost-menu-' + postId);
            if (menu) menu.classList.add('hidden');
        }

        function closeAllRepostMenus() {
            document.querySelectorAll('[id^="repost-menu-"]').forEach(m => m.classList.add('hidden'));
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'profile') renderProfileFeed();
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-white');
                el.classList.add('text-x-muted');
            });
            document.getElementById('nav-' + tabId).classList.remove('text-x-muted');
            document.getElementById('nav-' + tabId).classList.add('text-white');

            if(tabId === 'feed' || tabId === 'following') {
                document.getElementById('top-tabs').style.display = 'flex';
                document.getElementById('ind-feed').classList.toggle('hidden', tabId !== 'feed');
                document.getElementById('ind-following').classList.toggle('hidden', tabId !== 'following');

                document.getElementById('top-tabs').style.display = 'none';

        // --- 5. COMPOSE & DRAFTS ---

        function openCompose() {
            document.getElementById('compose-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('compose-sheet').classList.remove('translate-y-full'); }, 10);
            document.getElementById('compose-textarea').focus();
        }

        function closeCompose() {
            document.getElementById('compose-sheet').classList.add('translate-y-full');
            setTimeout(() => {
                document.getElementById('compose-modal').classList.add('hidden');
                document.getElementById('compose-textarea').value = '';
                removeImage();
            }, 300);
        }

        function checkCompose() {
            const val = document.getElementById('compose-textarea').value.trim();
            const btn = document.getElementById('post-btn');
            const draftBtn = document.getElementById('save-draft-btn');
            
            if (val.length > 0 || currentImageUpload || currentGifUrl) {
                btn.removeAttribute('disabled'); btn.classList.remove('opacity-50');
                draftBtn.removeAttribute('disabled'); draftBtn.classList.remove('opacity-50');
            } else {
                btn.setAttribute('disabled', 'true'); btn.classList.add('opacity-50');
                draftBtn.setAttribute('disabled', 'true'); draftBtn.classList.add('opacity-50');
            }
        }

        function saveDraft() {
            const val = document.getElementById('compose-textarea').value.trim();
            if(val) {
                xifyDrafts.push(val);
                localStorage.setItem('xifyDrafts', JSON.stringify(xifyDrafts));
            }
            closeCompose();
        }

        function openDraftsModal() {
            const container = document.getElementById('drafts-container');
            container.innerHTML = '';
            
            if(xifyDrafts.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-x-muted">No drafts saved.</div>`;
            } else {
                xifyDrafts.forEach((draft, idx) => {
                    container.innerHTML += `
                    <div class="p-4 border-b border-x-border hover:bg-white/5 cursor-pointer flex justify-between items-center" onclick="loadDraft(${idx})">
                        <div class="text-white truncate flex-1 pr-4">${escapeHTML(draft)}</div>
                        <button class="text-red-500 font-bold p-2 hover:bg-red-500/20 rounded-full w-8 h-8 flex items-center justify-center transition-colors" onclick="event.stopPropagation(); deleteDraft(${idx})">×</button>
                    </div>`;
                });
            }
            document.getElementById('drafts-modal').classList.remove('hidden');
        }

        function closeDraftsModal() {
            document.getElementById('drafts-modal').classList.add('hidden');
        }

        function loadDraft(idx) {
            document.getElementById('compose-textarea').value = xifyDrafts[idx];
            xifyDrafts.splice(idx, 1);
            localStorage.setItem('xifyDrafts', JSON.stringify(xifyDrafts));
            checkCompose();
            closeDraftsModal();
        }

        function deleteDraft(idx) {
            xifyDrafts.splice(idx, 1);
            localStorage.setItem('xifyDrafts', JSON.stringify(xifyDrafts));
            openDraftsModal(); // re-render
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                currentImageUpload = event.target.result;
                document.getElementById('preview-img').src = currentImageUpload;
                document.getElementById('compose-image-preview').classList.remove('hidden');
                checkCompose();
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            currentImageUpload = null;
            document.getElementById('compose-image-preview').classList.add('hidden');
            document.getElementById('image-upload').value = '';
            checkCompose();
        }

        let currentPostType = 'normal';

        function setPostType(type) {
            currentPostType = type;
            currentBeefTarget = null;
            currentPromoteSong = null;

            // Tab styles
            ['normal', 'beef', 'promote'].forEach(t => {
                const btn = document.getElementById('type-' + t);
                btn.classList.toggle('text-white', t === type);
                btn.classList.toggle('text-x-muted', t !== type);
                btn.classList.toggle('border-b-2', t === type);
                btn.classList.toggle('border-x-blue', t === type);
            });

            document.getElementById('beef-picker').classList.toggle('hidden', type !== 'beef');
            document.getElementById('promote-picker').classList.toggle('hidden', type !== 'promote');

            if (type === 'beef') {
                // Reset typeahead
                const input = document.getElementById('beef-artist-input');
                const badge = document.getElementById('beef-target-badge');
                const dropdown = document.getElementById('beef-artist-dropdown');
                if (input) input.value = '';
                if (badge) badge.classList.add('hidden');
                if (dropdown) dropdown.classList.add('hidden');
            }

            // Populate promote song select
            if (type === 'promote') {
                const songs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
                const sel = document.getElementById('promote-song-select');
                sel.innerHTML = '<option value="">— Pick a song —</option>';
                songs.forEach((s, i) => {
                    const name = s.songName || s.name || 'Untitled';
                    sel.innerHTML += `<option value="${i}">${name}</option>`;
                });
                const boostUsed = localStorage.getItem('xifyWeeklyBoostUsed') === localStorage.getItem('currentWeek');
                document.getElementById('boost-used-warning').classList.toggle('hidden', !boostUsed);
            }
        }

        function filterBeefArtists(query) {
            const chartSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
            // Deduplicate by artist name
            const seen = new Set();
            const artists = chartSongs.filter(s => !s.isUser && s.artist).filter(s => {
                const key = s.artist.toLowerCase();
                if (seen.has(key)) return false;
                seen.add(key); return true;
            });

            const dropdown = document.getElementById('beef-artist-dropdown');
            const q = query.trim().toLowerCase();
            const filtered = q ? artists.filter(s => s.artist.toLowerCase().includes(q)) : artists;

            if (!filtered.length) { dropdown.classList.add('hidden'); return; }

            dropdown.innerHTML = filtered.slice(0, 8).map(s => `
                <div class="flex items-center gap-3 px-4 py-3 hover:bg-white/5 cursor-pointer transition-colors" onclick="selectBeefTarget('${s.artist.replace(/'/g,"\\'")}')">
                    <div class="w-8 h-8 rounded-full overflow-hidden shrink-0 bg-gray-800">
                        ${s.art ? `<img src="${s.art}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-xs font-bold text-white" style="background:linear-gradient(135deg,#667eea,#764ba2)">${s.artist.slice(0,2).toUpperCase()}</div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-white text-sm font-bold truncate">${escapeHTML(s.artist)}</div>
                        <div class="text-x-muted text-xs">#${s.rank} on chart</div>
                    </div>
                </div>`).join('');
            dropdown.classList.remove('hidden');
        }

        function selectBeefTarget(artistName) {
            currentBeefTarget = artistName || null;
            const input = document.getElementById('beef-artist-input');
            const badge = document.getElementById('beef-target-badge');
            const dropdown = document.getElementById('beef-artist-dropdown');
            if (input) input.value = '';
            if (badge) { badge.textContent = artistName; badge.classList.remove('hidden'); }
            if (dropdown) dropdown.classList.add('hidden');
            checkCompose();
        }

        function selectPromoteSong(idx) {
            if (idx === '') { currentPromoteSong = null; return; }
            const songs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
            currentPromoteSong = songs[parseInt(idx)] || null;
            checkCompose();
        }

        function openQuoteCompose(postId) {
            const post = xifyPosts.find(p => p.id === postId);
            if (!post) return;
            currentQuotePost = post;
            openCompose();
            document.getElementById('quote-preview').classList.remove('hidden');
            document.getElementById('quote-preview-author').textContent = post.authorName + ' ' + post.authorHandle;
            document.getElementById('quote-preview-content').textContent = post.content.slice(0, 120) + (post.content.length > 120 ? '...' : '');
        }

        function submitPost() {
            const text = document.getElementById('compose-textarea').value.trim();
            if (!text && !currentImageUpload && !currentGifUrl) return;

            const pop = parseFloat(localStorage.getItem('popularity') || 0);
            const popMult = (pop / 100) * 2;
            const baseViews = Math.floor(currentUser.followers * (0.1 + Math.random() * 0.4) * (1 + popMult));
            const baseLikes = Math.floor(baseViews * (0.05 + Math.random() * 0.1));

            const newPost = {
                id: 'user_' + Date.now(),
                authorName: currentUser.name,
                authorHandle: currentUser.handle,
                avatar: currentUser.photo,
                isVerified: true,
                content: text,
                mediaType: currentGifUrl ? 'gif' : currentImageUpload ? 'image' : 'none',
                mediaData: currentGifUrl || currentImageUpload,
                likes: baseLikes,
                reposts: Math.floor(baseLikes * 0.1),
                comments: Math.floor(baseLikes * 0.05),
                views: baseViews,
                isLiked: false,
                isReposted: false,
                ts: parseInt(localStorage.getItem('currentWeek') || '1') * 10000 + Date.now() % 9999,
                npc: false,
                postType: currentPostType,
                quotePost: currentQuotePost ? { id: currentQuotePost.id, authorName: currentQuotePost.authorName, authorHandle: currentQuotePost.authorHandle, content: currentQuotePost.content.slice(0, 120) } : null,
                beefTarget: currentBeefTarget || null,
                promoteSong: currentPromoteSong ? (currentPromoteSong.songName || currentPromoteSong.name) : null
            };

            xifyPosts.unshift(newPost);

            let totalLikes = parseInt(localStorage.getItem('xifyTotalLikes') || '0');
            localStorage.setItem('xifyTotalLikes', String(totalLikes + baseLikes));
            let pc = parseInt(localStorage.getItem('xifyPostCount') || '0');
            localStorage.setItem('xifyPostCount', String(pc + 1));

            // ── BEEF: trigger NPC response ──
            if (currentPostType === 'beef' && currentBeefTarget) {
                triggerBeefResponse(currentBeefTarget, newPost);
            }

            // ── PROMOTE: queue stream boost for NEXT week ──
            if (currentPostType === 'promote' && currentPromoteSong) {
                const currentWeek = localStorage.getItem('currentWeek');
                const boostUsed = localStorage.getItem('xifyWeeklyBoostUsed');
                if (boostUsed !== currentWeek) {
                    localStorage.setItem('xifyPendingPromoteBoost', JSON.stringify(currentPromoteSong));
                    localStorage.setItem('xifyWeeklyBoostUsed', currentWeek);
                }
            }

            savePosts();
            closeCompose();
            // Lightweight refresh — don't re-run initApp which re-seeds NPCs
            renderFeed();
            renderTrending();
            // Refresh follower/like counts only
            const fmtFollowers = formatNum(currentUser.followers);
            const fmtLikes = formatNum(currentUser.likes);
            document.getElementById('profile-followers').innerText = fmtFollowers;
            document.getElementById('profile-likes').innerText = fmtLikes;
        }

        // ── GIF PICKER (Giphy) ──
        const GIPHY_KEY = 'CryBz2WvTWQRHjmQdZlLLzflaONQgquP';

        let currentGifUrl = null;
        let gifSearchTimeout = null;

        function toggleGifPicker() {
            const picker = document.getElementById('gif-picker');
            picker.classList.toggle('hidden');
            if (!picker.classList.contains('hidden')) loadDefaultGifs();
        }

        function renderGifGrid(gifs) {
            const grid = document.getElementById('gif-grid');
            if (!gifs.length) {
                grid.innerHTML = `<div class="col-span-2 text-center text-x-muted text-sm py-4">no gifs found</div>`;
                return;
            }
            grid.innerHTML = gifs.map(g => {
                const url = g.images?.fixed_height_small?.url || g.images?.original?.url;
                return `<div class="cursor-pointer rounded-xl overflow-hidden hover:opacity-80 transition-opacity" onclick="selectGif('${url}')">
                    <img src="${url}" class="w-full h-24 object-cover" loading="lazy">
                </div>`;
            }).join('');
        }

        async function loadDefaultGifs() {
            const grid = document.getElementById('gif-grid');
            grid.innerHTML = `<div class="col-span-2 flex justify-center py-4"><div class="spinner"></div></div>`;
            try {
                const res = await fetch(`https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=12&rating=g`);
                const data = await res.json();
                renderGifGrid(data.data || []);
            } catch(e) {
                grid.innerHTML = `<div class="col-span-2 text-center text-x-muted text-sm py-4">couldn't load gifs</div>`;
            }
        }

        function searchGifs(query) {
            clearTimeout(gifSearchTimeout);
            if (!query.trim()) { loadDefaultGifs(); return; }
            gifSearchTimeout = setTimeout(async () => {
                const grid = document.getElementById('gif-grid');
                grid.innerHTML = `<div class="col-span-2 flex justify-center py-4"><div class="spinner"></div></div>`;
                try {
                    const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=12&rating=g`);
                    const data = await res.json();
                    renderGifGrid(data.data || []);
                } catch(e) {
                    grid.innerHTML = `<div class="col-span-2 text-center text-x-muted text-sm py-4">search failed</div>`;
                }
            }, 400);
        }

        function selectGif(url) {
            currentGifUrl = url;
            document.getElementById('selected-gif-img').src = url;
            document.getElementById('gif-preview').classList.remove('hidden');
            document.getElementById('gif-picker').classList.add('hidden');
            checkCompose();
        }

        function removeGif() {
            currentGifUrl = null;
            document.getElementById('gif-preview').classList.add('hidden');
            document.getElementById('selected-gif-img').src = '';
            checkCompose();
        }

        function applyPromoteBoost(song) {
            try {
                const songs = JSON.parse(localStorage.getItem('releasedSongs') || '[]');
                const target = songs.find(s => (s.songName || s.name) === (song.songName || song.name));
                if (target) {
                    const boost = Math.floor(50000 + Math.random() * 150000);
                    target.currentWeeklyPlays = (target.currentWeeklyPlays || 0) + boost;
                    target.streams = (target.streams || 0) + boost;
                    localStorage.setItem('releasedSongs', JSON.stringify(songs));
                }
            } catch(e) { console.warn('Promote boost failed', e); }
        }

        async function triggerBeefResponse(artistName, playerPost) {
            const chartSongs = JSON.parse(localStorage.getItem('chart_songs_final') || '[]');
            const song = chartSongs.find(s => s.artist === artistName);
            if (!song) return;

            const personality = getPersonality(artistName);
            const handle = '@' + artistName.toLowerCase().replace(/[^a-z0-9]/g, '');
            const avatar = song.art || getChaoticAvatar(handle);

            const personalityDesc = {
                petty: 'petty and passive-aggressive — claps back with receipts and shade, loves pointing at the chart',
                unbothered: 'ice cold and dismissive — acts like it barely registered, says less but it hits harder',
                pr_machine: 'corporate damage control — stiff and formal but with a subtle read buried in the professionalism',
                messy: 'chaotic and oversharing — escalates immediately, brings up unrelated drama, claims to have receipts'
            }[personality] || 'unbothered';

            const playerTweetSnippet = playerPost.content.slice(0, 140);

            const artistPrompt = `You are ${artistName}, a real music artist on a Twitter-like app called Xify. Your personality: ${personalityDesc}.
Someone named ${currentUser.name} just tweeted this about you: "${playerTweetSnippet}"
You are at #${song.rank} on the Excellence Hot 100. They are your chart rival.

Write YOUR response tweet. It must:
- Quote or directly reference something specific from their tweet above (a word, a phrase, the vibe)
- Be max 220 chars
- Sound like a real artist clapping back, not a bot
- Match your personality (${personality})
- Use lowercase, real artist voice, emojis optional
- NO hashtags at the end
- Return ONLY the tweet text`;

            const stanPrompt = `You are a toxic ${artistName} stan on music Twitter. ${currentUser.name} just beefed with your fave.
${artistName} is at #${song.rank}. ${currentUser.name} started it with: "${playerTweetSnippet}"

Write a pile-on tweet defending ${artistName} and dragging ${currentUser.name}. Max 200 chars.
- all lowercase, unhinged, specific — mock something from their tweet
- no hashtags at the end
- return ONLY the tweet`;

            // Fire both AI calls in parallel
            const [artistText, stanText] = await Promise.all([
                fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: artistPrompt }] }], generationConfig: { temperature: 1.3, maxOutputTokens: 120 } })
                }).then(r => r.json()).then(d => d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim()).catch(() => null),

                fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: stanPrompt }] }], generationConfig: { temperature: 1.4, maxOutputTokens: 100 } })
                }).then(r => r.json()).then(d => d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim()).catch(() => null)
            ]);

            // Fallbacks
            const fallbackArtist = {
                petty: `lmaooo ${currentUser.name} really tried it 💀 #${song.rank} and not even thinking about you`,
                unbothered: `noted. streaming "${song.title}" if anyone needs me 🙂`,
                pr_machine: `We remain focused on the music. We do not engage in online altercations.`,
                messy: `i was gonna stay quiet but since ${currentUser.name} wants to do this — i have receipts. 🙂`
            }[personality];

            const fallbackStan = `${currentUser.name} really thought that was gonna land 💀 ${handle} didn't even flinch`;

            const responseText = artistText || fallbackArtist;
            const pileOnText = stanText || fallbackStan;

            const responsePost = createNPCPayload(artistName, handle, avatar, responseText, 'none', null);
            responsePost.quotePost = { id: playerPost.id, authorName: playerPost.authorName, authorHandle: playerPost.authorHandle, content: playerPost.content.slice(0, 120) };
            responsePost.isBeefResponse = true;

            xifyPosts.unshift(responsePost);

            // Artist's stans attack the player — multiple pile-ons with variety
            const stans = getStanAccounts(artistName);
            const playerStans = getStanAccounts(currentUser.name);

            // Main AI-generated pile-on
            const pileOnStan = stans[Math.floor(Math.random() * stans.length)];
            if (pileOnStan) {
                xifyPosts.unshift(createNPCPayload(pileOnStan.name, pileOnStan.handle, getChaoticAvatar(pileOnStan.handle), pileOnText, 'none', null));
            }

            // Second stan pile-on — quote-attacks the player's original post
            const pileOnStan2 = stans.find(s => s.handle !== pileOnStan?.handle) || stans[0];
            if (pileOnStan2 && playerPost) {
                const quickPileOns = [
                    `${currentUser.name} said this with their whole chest 💀 the delusion is actually impressive`,
                    `i'm sorry but who told ${currentUser.name} they were on ${artistName}'s level 😭`,
                    `${currentUser.name} really logged on today and chose embarrassment. respect the dedication i guess`,
                    `the way ${handle} didn't even have to try and ${currentUser.name} is still losing 😭`
                ];
                const pile2 = createNPCPayload(pileOnStan2.name, pileOnStan2.handle, getChaoticAvatar(pileOnStan2.handle),
                    quickPileOns[Math.floor(Math.random() * quickPileOns.length)], 'none', null);
                pile2.quotePost = { id: playerPost.id, authorName: playerPost.authorName, authorHandle: playerPost.authorHandle, content: playerPost.content.slice(0, 120) };
                xifyPosts.unshift(pile2);
            }

            // Player's own stans defend them
            const defendingStan = playerStans[Math.floor(Math.random() * playerStans.length)];
            if (defendingStan && Math.random() > 0.4) {
                const defenses = [
                    `actually no ${currentUser.name} was RIGHT and everyone is just scared to admit it`,
                    `${currentUser.name} said what they said and i'm not gonna let y'all rewrite history 😤`,
                    `${handle} fans really think responding automatically means winning 💀 it doesn't`,
                    `${currentUser.name} has been saying this for weeks and nobody listened now everyone's pressed`
                ];
                xifyPosts.unshift(createNPCPayload(defendingStan.name, defendingStan.handle, getChaoticAvatar(defendingStan.handle),
                    defenses[Math.floor(Math.random() * defenses.length)], 'none', null));
            }

            // Pop Base posts about the beef with a "screenshot" quote of the player's tweet
            const popBaseBeefLines = [
                `🚨 ${currentUser.name} appears to be starting beef with ${artistName} on Xify. ${artistName} has responded.`,
                `The ${currentUser.name} vs ${artistName} beef is heating up on Xify right now.`,
                `${artistName} just clapped back at ${currentUser.name} and the timeline is not okay.`
            ];
            const popBasePost = createNPCPayload('Pop Base', '@PopBase', AVATAR_POPBASE,
                popBaseBeefLines[Math.floor(Math.random() * popBaseBeefLines.length)], 'none', null);
            // Attach the player's tweet as a quote so it looks like a screenshot
            popBasePost.quotePost = { id: playerPost.id, authorName: playerPost.authorName, authorHandle: playerPost.authorHandle, content: playerPost.content.slice(0, 180) };
            xifyPosts.unshift(popBasePost);

            // Update beef state
            const beefs = JSON.parse(localStorage.getItem('xifyActiveBeefs') || '{}');
            beefs[artistName] = { round: 1, playerPost: playerPost.id, artistResponse: responsePost.id, personality };
            localStorage.setItem('xifyActiveBeefs', JSON.stringify(beefs));

            // Trending
            const tag = '#' + currentUser.name.replace(/\s/g,'') + 'vs' + artistName.replace(/\s/g,'');
            xifyPosts.unshift(createNPCPayload('xify drama', '@xifydrama', getChaoticAvatar('@xifydrama'),
                `${tag} is trending. the timeline is unhinged today.`, 'none', null));

            // Stat effects based on popularity gap
            const playerPop = parseFloat(localStorage.getItem('popularity') || '50');
            const artistPop = song.popularity || 50;
            if (artistPop > playerPop + 20) {
                const resp = parseFloat(localStorage.getItem('respect') || '50');
                localStorage.setItem('respect', String(Math.max(1, resp - 3)));
            }

            savePosts();
            renderFeed();
            renderTrending();
        }

        function closeCompose() {
            document.getElementById('compose-sheet').classList.add('translate-y-full');
            setTimeout(() => {
                document.getElementById('compose-modal').classList.add('hidden');
                document.getElementById('compose-textarea').value = '';
                document.getElementById('quote-preview').classList.add('hidden');
                document.getElementById('gif-picker').classList.add('hidden');
                removeImage();
                removeGif();
                currentQuotePost = null;
                currentBeefTarget = null;
                currentPromoteSong = null;
                currentPostType = 'normal';
                setPostType('normal');
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
