
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Musicfork</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
    /* --- BASE APP STYLES --- */
    :root {
        --bg-color: #0a0a0a;
        --card-bg: #141414;
        --text-main: #ffffff;
        --text-muted: #888888;
        --accent: #ff3530;
        --border: #222222;
        --nav-bg: rgba(15, 15, 15, 0.95);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
        font-family: 'Inter', sans-serif; 
        background: var(--bg-color); 
        color: var(--text-main); 
        overflow: hidden; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
    }

    /* --- TOP NAV --- */
    .top-nav { 
        background: var(--bg-color); 
        padding: 16px 24px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        border-bottom: 1px solid var(--border); 
        flex-shrink: 0; 
        z-index: 10;
    }
    .logo { 
        font-size: 26px; 
        font-family: 'Playfair Display', serif; 
        font-weight: 900; 
        color: var(--text-main); 
        text-decoration: none; 
        letter-spacing: -1px; 
    }
    .logo span { color: var(--accent); }

    /* --- HERO --- */
    .hero { 
        padding: 40px 20px; 
        text-align: center; 
        border-bottom: 1px solid var(--border); 
        flex-shrink: 0; 
        background: linear-gradient(180deg, #1a1a1a 0%, var(--bg-color) 100%);
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 8px; font-style: italic; font-weight: 700; line-height: 1.1; }
    .hero p { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

    /* --- MAIN CONTENT & TABS --- */
    .main { 
        flex: 1; 
        overflow-y: auto; 
        padding: 24px 24px 100px 24px; /* Bottom padding for nav */
        display: flex; 
        flex-direction: column; 
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .section-title { 
        font-family: 'Space Mono', monospace; 
        font-size: 12px; 
        color: var(--text-muted); 
        margin-bottom: 20px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
    }

    /* --- GRID & CARDS --- */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
        gap: 24px; 
    }
    
    .card { 
        background: transparent; 
        cursor: pointer; 
        transition: transform .2s ease; 
        position: relative;
    }
    .card:hover { transform: translateY(-4px); }
    
    .cover-wrapper { 
        width: 100%; 
        aspect-ratio: 1; 
        background: #222; 
        overflow: hidden; 
        position: relative;
        margin-bottom: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .cover-wrapper img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        transition: filter .3s, transform .5s; 
    }
    .card:hover .cover-wrapper img { filter: brightness(1.1); transform: scale(1.05); }

    .score-badge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 36px;
        height: 36px;
        background: var(--bg-color);
        border: 2px solid var(--text-main);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 13px;
        font-family: 'Inter', sans-serif;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .score-badge.bnm {
        color: var(--accent);
        border-color: var(--accent);
    }
    
    .info h3 { 
        font-family: 'Playfair Display', serif; 
        font-size: 16px; 
        font-weight: 700; 
        margin-bottom: 4px; 
        line-height: 1.2;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .info p { 
        font-family: 'Space Mono', monospace; 
        font-size: 10px; 
        color: var(--text-muted); 
        text-transform: uppercase; 
        letter-spacing: 0.5px;
    }

    /* --- BOTTOM NAVIGATION --- */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: var(--nav-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        padding: 12px 0;
        padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* iPhone safe area */
        z-index: 50;
    }
    
    .nav-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: color 0.2s;
        width: 50%;
    }
    .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .nav-btn.active { color: var(--text-main); }
    .nav-btn.active svg { fill: var(--accent); }

    /* --- MODAL (REVIEW PAGE) --- */
    .modal { 
        position: fixed; inset: 0; 
        background: rgba(0, 0, 0, 0.9); 
        display: none; 
        align-items: center; 
        justify-content: center; 
        z-index: 1000; 
        backdrop-filter: blur(8px); 
    }
    
    .modal-content { 
        background: #fdfdfd; /* Cream/Paper white */
        color: #111;
        width: 100%; 
        max-width: 800px; 
        height: 100%;
        max-height: 90vh; 
        overflow-y: auto;
        position: relative;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    @media (min-width: 800px) {
        .modal-content { border-radius: 12px; }
    }

    .mf-nav {
        border-bottom: 1px solid #ddd;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        background: rgba(253, 253, 253, 0.95);
        backdrop-filter: blur(10px);
        z-index: 10;
    }
    .mf-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
    .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #111; line-height: 1; padding: 0 8px; }

    .mf-body { padding: 40px 24px; max-width: 600px; margin: 0 auto; }

    .mf-cat { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 24px; display: block; color: var(--accent); font-weight: bold; }
    
    .mf-header { text-align: center; margin-bottom: 40px; }
    .mf-title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; font-style: italic; line-height: 1.1; margin-bottom: 12px; }
    .mf-artist { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 16px; color: #444; }
    
    .mf-split { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 40px; }
    .mf-art { width: 240px; height: 240px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    .mf-art img { width: 100%; height: 100%; object-fit: cover; }

    .mf-score-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 120px; }
    .mf-score-circle {
        width: 100px; height: 100px;
        border: 4px solid #111;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', sans-serif;
        font-size: 38px;
        font-weight: 800;
        margin-bottom: 12px;
    }
    .mf-verdict { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; font-weight: bold; text-align: center; }

    .mf-meta { border-top: 1px solid #ddd; padding-top: 24px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
    .mf-byline { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .mf-byline span { color: var(--accent); }
    
    .mf-details { display: flex; gap: 24px; font-family: 'Inter', sans-serif; font-size: 12px; color: #666; }
    .mf-details div { display: flex; gap: 6px; }
    .mf-label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #111; }

    .mf-desc {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        line-height: 1.6;
        color: #222;
        font-style: italic;
    }

    .modal-content::-webkit-scrollbar { width: 6px; }
    .modal-content::-webkit-scrollbar-thumb { background: #ccc; }

    @media (max-width: 600px) {
        .mf-split { flex-direction: column; gap: 24px; }
        .mf-title { font-size: 32px; }
        .mf-art { width: 200px; height: 200px; }
        .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    }
</style>
</head>
<body>

<nav class="top-nav">
    <a href="#" class="logo">Music<span>fork</span></a>
</nav>

<div class="hero" id="hero-section">
    <h1 id="hero-title">Trending Reviews</h1>
    <p id="hero-subtitle">The Best New Music and Critical Takes.</p>
</div>

<main class="main">
    <!-- TRENDING TAB -->
    <div id="tab-trending" class="tab-content active">
        <div class="section-title">New & Notable</div>
        <div class="grid" id="trending-grid"></div>
    </div>

    <!-- OWN TAB -->
    <div id="tab-own" class="tab-content">
        <div class="section-title">Your Discography</div>
        <div class="grid" id="own-grid"></div>
    </div>
</main>

<nav class="bottom-nav">
    <button class="nav-btn active" id="btn-trending" onclick="switchTab('trending')">
        <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
        Trending
    </button>
    <button class="nav-btn" id="btn-own" onclick="switchTab('own')">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        Own
    </button>
</nav>

<!-- REVIEW MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="mf-nav">
            <div class="mf-logo">Musicfork</div>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        
        <div class="mf-body">
            <span class="mf-cat">Review</span>
            
            <div class="mf-header">
                <h2 class="mf-title" id="mfTitle">Album Title</h2>
                <div class="mf-artist" id="mfArtist">Artist Name</div>
            </div>

            <div class="mf-split">
                <div class="mf-art">
                    <img id="mfCover" src="" alt="Cover">
                </div>
                
                <div class="mf-score-container">
                    <div class="mf-score-circle" id="mfScore">6.0</div>
                    <div class="mf-verdict" id="mfVerdict">Best New Music</div>
                </div>
            </div>

            <div class="mf-meta">
                <div class="mf-byline">By <span id="mfCritic">Rawiya Kameir</span></div>
                <div class="mf-details">
                    <div><span class="mf-label">Genre:</span> <span id="mfGenre">Pop</span></div>
                    <div><span class="mf-label">Reviewed:</span> <span id="mfDate">Nov 20, 2025</span></div>
                </div>
            </div>

            <div class="mf-desc" id="mfDesc">
                "A masterful display of technical prowess..."
            </div>
        </div>
    </div>
</div>

<script>
// --- UTILS & DATA SOURCING ---
const LS = {
    get: k => JSON.parse(localStorage.getItem(k) || 'null'),
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

const criticsNames = ['Rawiya Kameir', 'Alphonse Pierre', 'Evan Minsker', 'Jillian Mapes', 'Matthew Strauss', 'Jazz Monroe', 'Pitchfork Staff'];

const descriptions = {
    legendary: [
        "A monumental achievement that redefines the landscape of modern music.",
        "Flawless execution from start to finish. A timeless masterpiece.",
        "An awe-inspiring work of art that will be studied for generations."
    ],
    high: [
        "A masterful blend of innovation and accessibility that defines the current moment.",
        "Raw emotion meets polished production in this instant classic.",
        "An ambitious project that succeeds on almost every level.",
        "Boundless creativity that pushes the genre into fascinating new territories."
    ],
    mid: [
        "Solid production and catchy hooks, though it plays it somewhat safe.",
        "Moments of brilliance are weighed down by a lack of cohesion.",
        "A promising effort that doesn't quite reach the heights of their best work.",
        "Technically proficient, but lacking the spark that makes an album truly memorable."
    ],
    low: [
        "A confusing misstep that fails to connect emotionally or sonically.",
        "Repetitive ideas and uninspired production drag this project down.",
        "An experiment that unfortunately doesn't pay off.",
        "Feels unfinished and lacking in clear artistic direction."
    ]
};

// Returns the actual Game Date
function getGameDate() {
    const storedDate = localStorage.getItem('currentDate');
    return storedDate ? new Date(storedDate) : new Date();
}

// FORMAT: Nov 24, 2025
function formatDate(dateObj) {
    return dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

// DETERMINISTIC SCORE GENERATOR (Permanent per album name)
function generateMusicforkData(albumName) {
    let hash = 0;
    for (let i = 0; i < albumName.length; i++) {
        hash = ((hash << 5) - hash) + albumName.charCodeAt(i);
        hash |= 0;
    }
    
    // Scale hash to a score between 4.0 and 10.0
    const rawScore = Math.abs(hash % 61) + 40; 
    let finalScore = (rawScore / 10).toFixed(1);
    const numericScore = parseFloat(finalScore);

    const critic = criticsNames[Math.abs(hash) % criticsNames.length];

    let descText = "";
    let verdictText = "";
    let isBNM = false;
    
    if (numericScore >= 9.5) {
        descText = descriptions.legendary[Math.abs(hash) % descriptions.legendary.length];
        verdictText = "Best New Music";
        isBNM = true;
    } else if (numericScore >= 8.0) {
        descText = descriptions.high[Math.abs(hash) % descriptions.high.length];
        verdictText = "Best New Music";
        isBNM = true;
    } else if (numericScore >= 6.0) {
        descText = descriptions.mid[Math.abs(hash) % descriptions.mid.length];
        verdictText = "Good";
    } else {
        descText = descriptions.low[Math.abs(hash) % descriptions.low.length];
        verdictText = "Not Recommended";
    }

    return { score: finalScore, numericScore, critic, descText, verdictText, isBNM };
}

// --- RENDER LOGIC ---

// Create generic card HTML
function createCardHTML(album) {
    const title = album.name || album.title || album.albumName || 'Untitled';
    const artist = album.artistName || album.artist || 'Unknown Artist';
    const cover = album.coverArt || album.art || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4K';
    
    // Get permanent deterministic score
    const reviewData = generateMusicforkData(title);
    const badgeClass = reviewData.isBNM ? "score-badge bnm" : "score-badge";

    return `
        <div class="card" onclick='openModal(${JSON.stringify(album).replace(/'/g, "&#39;")})'>
            <div class="cover-wrapper">
                <img src="${cover}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4K'">
                <div class="${badgeClass}">${reviewData.score}</div>
            </div>
            <div class="info">
                <h3 title="${title}">${title}</h3>
                <p title="${artist}">${artist}</p>
            </div>
        </div>
    `;
}

function loadTrending() {
    const chartAlbums = LS.get('chart_albums_final') || [];
    const releasedAlbums = LS.get('releasedAlbums') || [];
    const myArtist = LS.get('artistDetails') || { name: 'You' };
    
    // Format own albums to match generic structure
    const formattedOwn = releasedAlbums.map(a => ({
        ...a,
        artistName: myArtist.name,
        isUser: true,
        weeks: a.stats ? a.stats.weeksCharting : (a.weeks || 1)
    }));

    // Combine chart + own, filter for "New" (weeks <= 4)
    let allTrending = [...chartAlbums, ...formattedOwn]
        .filter(a => (a.weeks || 1) <= 4)
        .sort((a, b) => (b.units || 0) - (a.units || 0));

    // If there aren't enough "new" albums, just grab the top 20 from charts
    if (allTrending.length < 5) {
        allTrending = chartAlbums.slice(0, 20);
    }

    // Deduplicate by title
    const seen = new Set();
    const finalTrending = [];
    allTrending.forEach(a => {
        const t = (a.title || a.name || a.albumName).toLowerCase();
        if (!seen.has(t)) {
            seen.add(t);
            finalTrending.push(a);
        }
    });

    const grid = document.getElementById('trending-grid');
    if (finalTrending.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1; color:#666; font-family:Space Mono;">No new albums found.</p>';
        return;
    }

    grid.innerHTML = finalTrending.slice(0, 30).map(createCardHTML).join('');
}

function loadOwn() {
    const albums = LS.get('releasedAlbums') || [];
    const artistDetails = LS.get('artistDetails') || { name: 'Unknown Artist' };
    const grid = document.getElementById('own-grid');

    if (!albums.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#444;font-family:Space Mono;">NO ALBUMS RELEASED YET</div>';
        return;
    }

    // Format for card creation
    const formattedAlbums = albums.map(a => ({
        ...a,
        artistName: artistDetails.name,
        genre: artistDetails.genre || 'Alternative'
    }));

    // Reverse to show newest first
    grid.innerHTML = formattedAlbums.reverse().map(createCardHTML).join('');
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`btn-${tab}`).classList.add('active');

    const heroTitle = document.getElementById('hero-title');
    const heroSub = document.getElementById('hero-subtitle');

    if (tab === 'trending') {
        heroTitle.innerText = "Trending Reviews";
        heroSub.innerText = "The Best New Music and Critical Takes.";
        loadTrending();
    } else {
        heroTitle.innerText = "Your Discography";
        heroSub.innerText = "Permanent Scores & Lifetime Reviews.";
        loadOwn();
    }
}

// --- MODAL LOGIC ---
function openModal(album) {
    const title = album.name || album.title || album.albumName || 'Untitled';
    const artist = album.artistName || album.artist || 'Unknown Artist';
    const cover = album.coverArt || album.art || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiMyMjIiLz48L3N2Zz4K';
    const genre = album.genre || "Pop/Rock";
    
    // Determine the review date (Use release date if own, else use game date minus random offset)
    let reviewDateStr = "";
    if (album.isUser || album.releaseDate) {
        const relDate = album.releaseDate ? new Date(album.releaseDate) : getGameDate();
        reviewDateStr = formatDate(relDate);
    } else {
        // NPC album - use current game date
        reviewDateStr = formatDate(getGameDate());
    }

    const { score, numericScore, critic, descText, verdictText, isBNM } = generateMusicforkData(title);
    
    // Populate Data
    document.getElementById('mfTitle').textContent = title;
    document.getElementById('mfArtist').textContent = artist;
    document.getElementById('mfCover').src = cover;
    
    document.getElementById('mfScore').textContent = score;
    document.getElementById('mfVerdict').textContent = verdictText;
    document.getElementById('mfVerdict').style.display = isBNM ? 'block' : 'none'; 
    
    const circle = document.getElementById('mfScore');
    if(isBNM) { 
        circle.style.color = 'var(--accent)'; 
        circle.style.borderColor = 'var(--accent)'; 
    } else { 
        circle.style.color = '#111'; 
        circle.style.borderColor = '#111'; 
    }

    document.getElementById('mfDesc').textContent = `"${descText}"`;
    document.getElementById('mfCritic').textContent = critic;
    document.getElementById('mfGenre').textContent = genre;
    document.getElementById('mfDate').textContent = reviewDateStr;

    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

document.getElementById('modal').onclick = e => {
    if (e.target.id === 'modal') closeModal();
};

document.onkeydown = e => {
    if (e.key === 'Escape') closeModal();
};

// INIT
window.onload = () => {
    loadTrending(); // Default tab
};
</script>
</body>
</html>
